<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultas Yurest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: justify-content 0.3s;
    }

    body.has-response {
      justify-content: flex-start;
      padding-top: 60px;
    }

    .search-container {
      width: 100%;
      max-width: 640px;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
    }

    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 15px;
    }

    .search-box {
      display: flex;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus-within {
      border-color: #4a6cf7;
      box-shadow: 0 0 0 4px rgba(74, 108, 247, 0.1);
    }

    .search-box input {
      flex: 1;
      padding: 16px 20px;
      font-size: 16px;
      border: none;
      outline: none;
      background: transparent;
    }

    .search-box button {
      padding: 16px 24px;
      background: #4a6cf7;
      color: #fff;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-box button:hover { background: #3a5ce5; }
    .search-box button:disabled { background: #a0b0e8; cursor: not-allowed; }

    .response-container {
      width: 100%;
      max-width: 640px;
      margin-top: 32px;
      display: none;
    }

    .response-container.visible { display: block; }

    .response-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      line-height: 1.7;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 24px;
      color: #666;
    }

    .loading .dots span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4a6cf7;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading .dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading .dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .pdf-container {
      width: 100%;
      max-width: 1200px;
      margin-top: 32px;
    }

    .error {
      background: #fff0f0;
      color: #c33;
      border-radius: 12px;
      padding: 16px 24px;
    }
  </style>
</head>
<body>
  <div class="search-container">
    <img src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest" style="max-width: 200px; margin-bottom: 24px; border-radius: 16px;">
    <h1>Funcionalidades 1/1/2026 - 16/3/2026</h1>
  </div>

  <div class="pdf-container">
    <iframe src="https://drive.google.com/file/d/1Ue4tcKJzkG3BphcUr31myIv4HISIIezl/preview" width="100%" height="800" allow="autoplay" style="border: none; border-radius: 12px;"></iframe>
  </div>
</body>
</html>
