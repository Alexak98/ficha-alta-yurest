<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Kanban CS — Yurest</title>
    <script src="config.js"></script>
    <script>YurestConfig.requireAuth('cs_kanban');</script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Sidebar (shared layout) ────────────────────────────────── */
        .sidebar-overlay { position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:500;opacity:0;pointer-events:none;transition:opacity .25s }
        .sidebar-overlay.open { opacity:1;pointer-events:all }
        .sidebar { position:fixed;top:0;left:0;width:248px;height:100vh;background:#fff;z-index:600;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.13);display:flex;flex-direction:column }
        .sidebar.open { transform:translateX(0) }
        .sidebar-hd { display:flex;align-items:center;justify-content:space-between;padding:20px 18px 16px;border-bottom:1.5px solid #f1f5f9 }
        .sidebar-brand { display:flex;align-items:center;gap:8px;font-size:.78rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:#fc5858 }
        .sidebar-brand-dot { width:8px;height:8px;background:#fc5858;border-radius:50%;box-shadow:0 0 0 3px rgba(252,88,88,.25) }
        .sidebar-close { width:28px;height:28px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s }
        .sidebar-close:hover { background:#fee2e2;border-color:#fecaca;color:#dc2626 }
        .sidebar-label { padding:16px 18px 6px;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#94a3b8 }
        .sidebar-item { display:flex;align-items:center;gap:12px;padding:11px 18px;margin:2px 10px;border-radius:10px;font-size:.88rem;font-weight:500;color:#334155;text-decoration:none;cursor:pointer;transition:background .14s }
        .sidebar-item:hover { background:#f8fafc;color:#1e293b }
        .sidebar-item.active { background:#fff1f1;color:#fc5858;font-weight:700 }
        .sidebar-item svg { flex-shrink:0;opacity:.7 }
        .sidebar-item.active svg { opacity:1 }
        .sidebar-group { margin:2px 0 }
        .sidebar-group-header { display:flex;align-items:center;gap:12px;padding:11px 18px;margin:2px 10px;border-radius:10px;font-size:.88rem;font-weight:500;color:#334155;cursor:pointer;user-select:none;transition:background .14s,color .14s }
        .sidebar-group-header:hover { background:#f8fafc;color:#1e293b }
        .sidebar-group-header svg { flex-shrink:0;opacity:.7 }
        .sidebar-group-chevron { margin-left:auto;transition:transform .18s }
        .sidebar-group.open .sidebar-group-chevron { transform:rotate(90deg) }
        .sidebar-group-children { max-height:0;overflow:hidden;transition:max-height .2s ease }
        .sidebar-group.open .sidebar-group-children { max-height:500px }
        .sidebar-group-children .sidebar-item { padding-left:44px;font-size:.84rem;position:relative }
        .sidebar-group-children .sidebar-item::before { content:'';position:absolute;left:30px;top:50%;width:8px;height:1.5px;background:#cbd5e1 }
        .sidebar-badge { display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 8px;font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,#fb923c,#f59e0b);border-radius:999px;margin-left:auto }
        .sidebar-badge:empty { display:none }
        .sidebar-group-badge { display:none;min-width:20px;height:20px;padding:0 7px;font-size:10px;font-weight:800;color:#fff;background:linear-gradient(135deg,#fb923c,#f59e0b);border-radius:999px;align-items:center;justify-content:center;margin-left:auto } .sidebar-group:not(.open) .sidebar-group-badge:not(:empty) { display:inline-flex }
        .sidebar-ft { margin-top:auto;padding:16px 18px;border-top:1.5px solid #f1f5f9 }
        .sidebar-ft button { display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:.85rem;font-weight:600;font-family:inherit;cursor:pointer }
        .sidebar-ft button:hover { background:#fee2e2 }
        .btn-menu { display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;color:#64748b;transition:border-color .15s }
        .btn-menu:hover { border-color:#fc5858;color:#fc5858;background:#fff1f1 }

        /* ── Layout ─────────────────────────────────────────────── */

        /* `min-width:0` aquí y en .kb-board son imprescindibles: en un flex
           container vertical, los hijos no respetan el ancho del padre por
           defecto si su contenido es más ancho. Sin esto el .kb-board crece
           hasta el tamaño total de las columnas y el scroll se aplica al
           body (la web "se mueve por detrás") en vez de quedarse dentro
           del tablero. Con min-width:0 el overflow-x:auto del board sí
           recorta y dibuja su propia barra de scroll horizontal. */
        html, body { overflow-x:hidden }
        .page-content {
            padding:18px 22px;
            display:flex; flex-direction:column;
            gap:14px;
            height:calc(100vh - 73px);
            min-width:0;
            max-width:100%;
        }

        .kb-hero {
            display:flex;align-items:center;justify-content:space-between;
            gap:12px;flex-wrap:nowrap;
        }
        .kb-hero-text { min-width:0;flex:1 }
        .kb-hero h2 { font-size:1.2rem;font-weight:800;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
        .kb-hero p  { font-size:12.5px;color:#64748b;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis }

        .kb-toolbar { display:flex;align-items:center;gap:8px;flex-wrap:nowrap;flex-shrink:0 }
        .search-wrap { position:relative;width:200px;flex:0 0 auto }
        .search-icon { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none }
        .search-input { width:100%;padding:7px 12px 7px 32px;font-family:inherit;font-size:.82rem;color:#1e293b;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;transition:border-color .15s }
        .search-input:focus { outline:none;border-color:#ec4899 }
        .filter-select { padding:6px 26px 6px 10px;font-family:inherit;font-size:.78rem;font-weight:600;color:#475569;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 8px center }
        .filter-select.active { background-color:#fdf2f8;border-color:#ec4899;color:#be185d }

        .loading { text-align:center;padding:32px 0;color:#94a3b8 }
        .loading .spinner { display:inline-block;width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:#ec4899;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px }
        @keyframes spin { to { transform:rotate(360deg) } }

        /* ── Tablero ───────────────────────────────────────────── */
        .kb-board {
            flex:1;
            display:flex;
            gap:12px;
            overflow-x:auto;
            overflow-y:hidden;
            padding-bottom:8px;
            min-width:0;
            max-width:100%;
            /* Scroll fluido con rueda del trackpad/ratón en horizontal */
            overscroll-behavior-x:contain;
        }
        .kb-board::-webkit-scrollbar { height:10px }
        .kb-board::-webkit-scrollbar-thumb { background:#cbd5e1;border-radius:6px }

        .kb-col {
            flex:0 0 280px;
            display:flex;flex-direction:column;
            background:#f1f5f9;
            border-radius:12px;
            border:1.5px solid #e2e8f0;
            min-height:0;
            transition:background .15s,border-color .15s;
        }
        .kb-col.drag-over { background:#fdf2f8;border-color:#ec4899 }
        .kb-col-head {
            padding:12px 14px 10px;
            display:flex;align-items:center;justify-content:space-between;gap:8px;
            border-bottom:1.5px solid #e2e8f0;
        }
        .kb-col-title {
            font-size:12px;font-weight:800;color:#0f172a;
            letter-spacing:.02em;
            display:flex;align-items:center;gap:8px;flex:1;min-width:0;
        }
        .kb-col-dot {
            width:10px;height:10px;border-radius:50%;flex-shrink:0;
            background:var(--col-color, #94a3b8);
            box-shadow:0 0 0 3px var(--col-color-soft, rgba(148,163,184,.2));
        }
        .kb-col-name { white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12.5px }
        .kb-col-count {
            font-size:10px;font-weight:800;color:#475569;
            background:#fff;border:1.5px solid #e2e8f0;
            padding:2px 8px;border-radius:999px;
            min-width:24px;text-align:center;flex-shrink:0;
        }
        .kb-col-body {
            flex:1;overflow-y:auto;
            padding:10px;display:flex;flex-direction:column;gap:8px;
            min-height:60px;
        }
        .kb-col-body::-webkit-scrollbar { width:6px }
        .kb-col-body::-webkit-scrollbar-thumb { background:#cbd5e1;border-radius:4px }

        .kb-empty { text-align:center;color:#94a3b8;font-size:12px;font-style:italic;padding:14px 0 }

        /* ── Card ───────────────────────────────────────────────── */
        .kb-card {
            background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;
            padding:10px 12px;cursor:grab;
            transition:all .12s;
            box-shadow:0 1px 2px rgba(15,23,42,.04);
            user-select:none;
        }
        .kb-card:hover { border-color:#ec4899;box-shadow:0 4px 12px rgba(236,72,153,.08);transform:translateY(-1px) }
        .kb-card.dragging { opacity:.4;cursor:grabbing }
        .kb-card-name { font-size:13px;font-weight:700;color:#0f172a;line-height:1.2 }
        .kb-card-sub  { font-size:10.5px;color:#94a3b8;margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap }
        .kb-card-sub b { color:#475569;font-weight:700 }
        .kb-card-meta {
            margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:6px;
            font-size:10px;color:#64748b;
        }
        .kb-card-impl { font-size:10px;color:#475569;font-weight:600 }
        .kb-card-tipo {
            font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:999px;
            text-transform:uppercase;letter-spacing:.04em;
            background:#ede9fe;color:#5b21b6;
        }
        .kb-card-tipo.cp { background:#fce7f3;color:#9d174d }
        .kb-card-tipo.lite { background:#dbeafe;color:#1e40af }
        .kb-card-tipo.planes { background:#fef3c7;color:#92400e }

        /* Toast */
        .toast { position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:1000;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.12);background:#fff;border:1.5px solid #e2e8f0;color:#1e293b;max-width:90%;transition:opacity .25s }
        .toast.error { border-color:#fca5a5;color:#b91c1c;background:#fff5f5 }
        .toast.ok    { border-color:#bbf7d0;color:#166534;background:#f0fdf4 }

        @media (max-width: 720px) {
            .page-content { padding:14px;height:auto }
            .kb-hero { flex-wrap:wrap }
            .kb-toolbar { flex-wrap:wrap;width:100% }
            .search-wrap { width:100% }
            .kb-board { flex-direction:column;overflow-x:hidden;overflow-y:visible;height:auto }
            .kb-col { flex:0 0 auto }
            .kb-col-body { max-height:none }
        }
    </style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar"></nav>

<div class="page-header">
    <button class="btn-menu" onclick="openSidebar()" title="Menú" aria-label="Abrir menú lateral">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <img src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest">
    <h1>Customer Success — Kanban</h1>
</div>

<div class="page-content">

    <div class="kb-hero">
        <div class="kb-hero-text">
            <h2>Kanban Customer Success</h2>
            <p>Arrastra tarjetas entre columnas para mover el estado de cada cliente.</p>
        </div>
        <div class="kb-toolbar">
            <div class="search-wrap">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="search-input" class="search-input" type="search" placeholder="Buscar cliente…" />
            </div>
            <select class="filter-select" id="filtro-tipo" title="Tipo cliente">
                <option value="">Tipo: todos</option>
                <option value="corporate">Corporate</option>
                <option value="corporate_cp">Corporate + CP</option>
                <option value="corp_cocina">Cocina Producción</option>
                <option value="planes">Planes</option>
                <option value="lite">Lite</option>
            </select>
            <select class="filter-select" id="filtro-impl" title="Implementador">
                <option value="">Implementador: todos</option>
            </select>
        </div>
    </div>

    <div id="loading" class="loading"><span class="spinner"></span>Cargando clientes…</div>

    <div class="kb-board" id="kb-board" style="display:none"></div>

</div>

<script src="sidebar.js"></script>
<script>YurestSidebar.render('cs_kanban');</script>

<script>
    'use strict';

    // ─────────────────────────────────────────────────────────────────────
    //  Definición de columnas — orden y colores
    // ─────────────────────────────────────────────────────────────────────
    const COLUMNAS = [
        { id: 'sin_clasificar',              label: 'Sin clasificar',         color: '#94a3b8' },
        { id: 'en_implementacion',           label: 'En implementación',      color: '#3b82f6' },
        { id: 'post_primer_mes',             label: 'Post primer mes',        color: '#0ea5e9' },
        { id: 'reunion_post_1_mes_agendada', label: 'Reunión 1m agendada',    color: '#0d9488' },
        { id: 'posible_escalado',            label: 'Posible escalado',       color: '#a855f7' },
        { id: 'stand_by',                    label: 'Stand-by / Sin respuesta', color: '#f59e0b' },
        { id: 'critico',                     label: 'Estado crítico',         color: '#ef4444' },
        { id: 'sanacion',                    label: 'Proceso de sanación',    color: '#fb923c' },
        { id: 'post_3_meses',                label: 'Post 3 meses',           color: '#22c55e' }
    ];
    // 'sin_clasificar' es un id sintético que solo vive en el front para
    // los clientes que aún no tienen cs_estado en BD (NULL). Al moverlos
    // a otra columna se persiste el slug real; al moverlos de vuelta a
    // sin_clasificar enviamos null.

    const esc = YurestConfig.escHtml;
    const escAttr = YurestConfig.escAttr;

    // ─────────────────────────────────────────────────────────────────────
    //  Estado
    // ─────────────────────────────────────────────────────────────────────
    let CLIENTES = [];
    let FILTROS = { q: '', tipo: '', impl: '' };

    function openSidebar()  { document.getElementById('sidebar').classList.add('open');  document.getElementById('sidebar-overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

    function toast(msg, tipo) {
        const t = document.createElement('div');
        t.className = 'toast' + (tipo ? ' ' + tipo : '');
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 280); }, 3200);
    }

    // ─────────────────────────────────────────────────────────────────────
    //  Carga
    // ─────────────────────────────────────────────────────────────────────
    async function cargar() {
        try {
            const res = await YurestConfig.apiFetch(YurestConfig.ENDPOINTS.altas + '?_=' + Date.now(),
                { method: 'GET', headers: { 'Cache-Control': 'no-cache' } });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            const raw = Array.isArray(data) ? data
                : Array.isArray(data.clientes) ? data.clientes
                : Array.isArray(data.data) ? data.data : [];
            CLIENTES = raw.map(normalizarCliente)
                          .filter(c => c.id && c.nombre)
                          .filter(c => c.estado !== 'pendiente');
        } catch (err) {
            console.warn('[cs-kanban] error:', err);
            CLIENTES = [];
            toast('No se pudieron cargar los clientes.', 'error');
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('kb-board').style.display = '';
        poblarFiltroImpl();
        render();
    }

    function normalizarCliente(f) {
        const tipoOriginal = String(f.tipo_cliente || f['Tipo Cliente'] || '').toLowerCase().trim();
        const tipoCorto = tipoOriginal === 'corporate_cp' ? 'cp'
                        : tipoOriginal === 'corp_cocina'  ? 'cp'
                        : tipoOriginal === 'lite'         ? 'lite'
                        : tipoOriginal === 'planes'       ? 'planes'
                        : 'corporate';
        return {
            id:           f.id || f.ID,
            nombre:       f.nombre_comercial || f['Nombre Comercial'] || f.denominacion || '',
            sociedad:     f.denominacion || '',
            cif:          f.cif || '',
            comercial:    f.comercial || '',
            implementador: f.implementador || '',
            tipoOriginal,
            tipoCorto,
            estado:       String(f.estado || '').toLowerCase() === 'pendiente' ? 'pendiente' : 'activo',
            cs_estado:    f.cs_estado || null,
            raw: f
        };
    }

    function poblarFiltroImpl() {
        const sel = document.getElementById('filtro-impl');
        const impls = [...new Set(CLIENTES.map(c => c.implementador).filter(Boolean))].sort();
        sel.innerHTML = '<option value="">Implementador: todos</option>' +
            impls.map(i => `<option value="${escAttr(i)}">${esc(i)}</option>`).join('');
    }

    // ─────────────────────────────────────────────────────────────────────
    //  Render
    // ─────────────────────────────────────────────────────────────────────
    function clientesFiltrados() {
        const q = (FILTROS.q || '').toLowerCase();
        return CLIENTES.filter(c => {
            if (FILTROS.tipo && c.tipoOriginal !== FILTROS.tipo) return false;
            if (FILTROS.impl && c.implementador !== FILTROS.impl) return false;
            if (q) {
                const hay = [c.nombre, c.sociedad, c.cif, c.comercial, c.implementador]
                    .some(v => (v || '').toLowerCase().includes(q));
                if (!hay) return false;
            }
            return true;
        });
    }

    function render() {
        const board = document.getElementById('kb-board');
        const items = clientesFiltrados();

        // Agrupa por columna. Los clientes con cs_estado null caen en 'sin_clasificar'.
        const porCol = {};
        COLUMNAS.forEach(c => { porCol[c.id] = []; });
        for (const cli of items) {
            const colId = cli.cs_estado || 'sin_clasificar';
            (porCol[colId] || porCol['sin_clasificar']).push(cli);
        }
        // Orden alfabético dentro de cada columna.
        Object.values(porCol).forEach(arr => arr.sort((a, b) => (a.nombre || '').localeCompare(b.nombre || '')));

        board.innerHTML = COLUMNAS.map(col => `
            <div class="kb-col"
                 data-col="${escAttr(col.id)}"
                 style="--col-color:${col.color};--col-color-soft:${col.color}33"
                 ondragover="onDragOver(event)"
                 ondragleave="onDragLeave(event)"
                 ondrop="onDrop(event)">
                <div class="kb-col-head">
                    <div class="kb-col-title">
                        <span class="kb-col-dot"></span>
                        <span class="kb-col-name">${esc(col.label)}</span>
                    </div>
                    <span class="kb-col-count">${porCol[col.id].length}</span>
                </div>
                <div class="kb-col-body" data-col="${escAttr(col.id)}">
                    ${porCol[col.id].length
                        ? porCol[col.id].map(cardHtml).join('')
                        : `<div class="kb-empty">— vacío —</div>`}
                </div>
            </div>
        `).join('');
    }

    function tipoLabel(t) {
        return t === 'corporate_cp' ? 'CORP+CP'
             : t === 'corp_cocina'  ? 'CP'
             : t === 'lite'         ? 'LITE'
             : t === 'planes'       ? 'PLANES'
             : 'CORP';
    }

    function cardHtml(c) {
        return `
            <div class="kb-card"
                 draggable="true"
                 data-id="${escAttr(c.id)}"
                 data-from="${escAttr(c.cs_estado || 'sin_clasificar')}"
                 ondragstart="onDragStart(event)"
                 ondragend="onDragEnd(event)">
                <div class="kb-card-name">${esc(c.nombre)}</div>
                ${c.sociedad ? `<div class="kb-card-sub">${esc(c.sociedad)}</div>` : ''}
                <div class="kb-card-meta">
                    <span class="kb-card-impl">${c.implementador ? esc(c.implementador) : '—'}</span>
                    <span class="kb-card-tipo ${c.tipoCorto}">${tipoLabel(c.tipoOriginal)}</span>
                </div>
            </div>`;
    }

    // ─────────────────────────────────────────────────────────────────────
    //  Drag & drop
    // ─────────────────────────────────────────────────────────────────────
    let DRAG_CARD = null;

    function onDragStart(ev) {
        const card = ev.currentTarget;
        DRAG_CARD = card;
        card.classList.add('dragging');
        ev.dataTransfer.effectAllowed = 'move';
        // Firefox necesita que se settee algún dato.
        try { ev.dataTransfer.setData('text/plain', card.dataset.id); } catch (_) {}
    }
    function onDragEnd(ev) {
        if (DRAG_CARD) DRAG_CARD.classList.remove('dragging');
        DRAG_CARD = null;
        document.querySelectorAll('.kb-col.drag-over').forEach(c => c.classList.remove('drag-over'));
    }
    function onDragOver(ev) {
        ev.preventDefault();
        ev.dataTransfer.dropEffect = 'move';
        ev.currentTarget.classList.add('drag-over');
    }
    function onDragLeave(ev) {
        // Sólo quitamos el highlight cuando salimos de la columna entera,
        // no al pasar entre cards hijas.
        if (ev.currentTarget.contains(ev.relatedTarget)) return;
        ev.currentTarget.classList.remove('drag-over');
    }
    async function onDrop(ev) {
        ev.preventDefault();
        const col  = ev.currentTarget;
        const colId = col.dataset.col;
        col.classList.remove('drag-over');

        if (!DRAG_CARD) return;
        const id = DRAG_CARD.dataset.id;
        const from = DRAG_CARD.dataset.from;
        if (colId === from) return;  // mismo sitio, nada que hacer

        // Optimista: actualizamos UI inmediatamente.
        const cli = CLIENTES.find(c => c.id === id);
        if (!cli) return;
        const previo = cli.cs_estado;
        cli.cs_estado = (colId === 'sin_clasificar') ? null : colId;
        render();

        try {
            const sess = YurestConfig.getSession();
            const movidoPor = (sess && (sess.user || sess.username)) || null;
            const res = await YurestConfig.apiFetch(YurestConfig.ENDPOINTS.csEstado, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    ficha_id: id,
                    cs_estado: cli.cs_estado,
                    movido_por: movidoPor
                })
            });
            const body = await res.json().catch(() => null);
            if (!res.ok || (body && body.success === false)) {
                throw new Error((body && body.errores && body.errores.join('; ')) || ('HTTP ' + res.status));
            }
            toast('Cliente movido a "' + (COLUMNAS.find(c => c.id === colId) || {}).label + '"', 'ok');
        } catch (err) {
            console.warn('[cs-kanban] error:', err);
            cli.cs_estado = previo;  // revertimos optimista
            render();
            toast('No se pudo mover: ' + (err.message || err), 'error');
        }
    }
    // Hacemos las funciones globales para los handlers inline.
    window.onDragStart = onDragStart;
    window.onDragEnd   = onDragEnd;
    window.onDragOver  = onDragOver;
    window.onDragLeave = onDragLeave;
    window.onDrop      = onDrop;

    // ─────────────────────────────────────────────────────────────────────
    //  Wire-up filtros
    // ─────────────────────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', (ev) => {
        FILTROS.q = ev.target.value || ''; render();
    });
    document.getElementById('filtro-tipo').addEventListener('change', (ev) => {
        FILTROS.tipo = ev.target.value || '';
        ev.target.classList.toggle('active', !!FILTROS.tipo);
        render();
    });
    document.getElementById('filtro-impl').addEventListener('change', (ev) => {
        FILTROS.impl = ev.target.value || '';
        ev.target.classList.toggle('active', !!FILTROS.impl);
        render();
    });

    cargar();
</script>

</body>
</html>
