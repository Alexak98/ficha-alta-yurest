<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Updates — Yurest</title>
    <script src="config.js"></script>
    <script>YurestConfig.requireAuth();</script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; }

        .page-content { padding:24px;max-width:1400px;margin:0 auto }
        .page-toolbar { margin-bottom:16px }
        .page-toolbar h2 { font-size:1.35rem;font-weight:700;color:#0f172a;margin:0 }
        .page-toolbar p  { font-size:.85rem;color:#64748b;margin:3px 0 0 0 }

        .pdf-wrap {
            background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;
            overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.04);
        }
        .pdf-wrap iframe {
            display:block;width:100%;height:calc(100vh - 220px);min-height:600px;
            border:0;
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="sidebar.js"></script>
    <script>YurestSidebar.render('updates');</script>

    <div class="page-header">
        <button class="btn-menu" onclick="openSidebar()" title="Menú">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <img src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest">
        <h1>Updates</h1>
    </div>

    <div class="page-content">
        <div class="page-toolbar">
            <h2>Funcionalidades 1/1/2026 - 16/3/2026</h2>
            <p>Resumen de las novedades incorporadas en el periodo.</p>
        </div>

        <div class="pdf-wrap">
            <iframe src="https://drive.google.com/file/d/1Ue4tcKJzkG3BphcUr31myIv4HISIIezl/preview" allow="autoplay"></iframe>
        </div>
    </div>

<script>
    function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }
</script>
</body>
</html>
