<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad — Yurest</title>
    <script src="config.js"></script>
    <script>YurestConfig.requireAuth();</script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sidebar (mismo bloque que el resto de páginas) */
        .sidebar-overlay { position:fixed; inset:0; background:rgba(15,23,42,.45); z-index:500; opacity:0; pointer-events:none; transition:opacity .25s; }
        .sidebar-overlay.open { opacity:1; pointer-events:all; }
        .sidebar { position:fixed; top:0; left:0; width:248px; height:100vh; background:#fff; z-index:600; transform:translateX(-100%); transition:transform .26s cubic-bezier(.4,0,.2,1); box-shadow:4px 0 24px rgba(0,0,0,.13); display:flex; flex-direction:column; }
        .sidebar.open { transform:translateX(0); }
        .sidebar-hd { display:flex; align-items:center; justify-content:space-between; padding:20px 18px 16px; border-bottom:1.5px solid #f1f5f9; }
        .sidebar-brand { display:flex; align-items:center; gap:8px; font-size:.78rem; font-weight:800; letter-spacing:.13em; text-transform:uppercase; color:#fc5858; }
        .sidebar-brand-dot { width:8px; height:8px; background:#fc5858; border-radius:50%; box-shadow:0 0 0 3px rgba(252,88,88,.25); }
        .sidebar-close { width:28px; height:28px; border-radius:8px; border:1.5px solid #e2e8f0; background:#f8fafc; color:#64748b; font-size:.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .sidebar-close:hover { background:#fee2e2; border-color:#fecaca; color:#dc2626; }
        .sidebar-label { padding:16px 18px 6px; font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#94a3b8; }
        .sidebar-item { display:flex; align-items:center; gap:12px; padding:11px 18px; margin:2px 10px; border-radius:10px; font-size:.88rem; font-weight:500; color:#334155; text-decoration:none; cursor:pointer; }
        .sidebar-item:hover { background:#f8fafc; color:#1e293b; }
        .sidebar-item.active { background:#fff1f1; color:#fc5858; font-weight:700; }
        .sidebar-item svg { flex-shrink:0; opacity:.7; }
        .sidebar-item.active svg { opacity:1; }
        .sidebar-group { margin:2px 0; }
        .sidebar-group-header { display:flex; align-items:center; gap:12px; padding:11px 18px; margin:2px 10px; border-radius:10px; font-size:.88rem; font-weight:500; color:#334155; cursor:pointer; user-select:none; }
        .sidebar-group-header:hover { background:#f8fafc; color:#1e293b; }
        .sidebar-group-header svg { flex-shrink:0; opacity:.7; }
        .sidebar-group-chevron { margin-left:auto; transition:transform .18s; }
        .sidebar-group.open .sidebar-group-chevron { transform:rotate(90deg); }
        .sidebar-group-children { max-height:0; overflow:hidden; transition:max-height .2s ease; }
        .sidebar-group.open .sidebar-group-children { max-height:500px; }
        .sidebar-group-children .sidebar-item { padding-left:44px; font-size:.84rem; position:relative; }
        .sidebar-group-children .sidebar-item::before { content:''; position:absolute; left:30px; top:50%; width:8px; height:1.5px; background:#cbd5e1; }
        .sidebar-badge { display:inline-flex; align-items:center; justify-content:center; min-width:22px; height:22px; padding:0 8px; font-size:11px; font-weight:800; color:#fff; background:linear-gradient(135deg,#fb923c,#f59e0b); border-radius:999px; margin-left:auto; box-shadow:0 1px 3px rgba(245,158,11,.35); letter-spacing:.02em; }
        .sidebar-badge:empty { display:none; }
        .sidebar-ft { margin-top:auto; padding:16px 18px; border-top:1.5px solid #f1f5f9; }
        .sidebar-ft button { display:flex; align-items:center; gap:8px; width:100%; padding:10px 14px; border-radius:10px; border:1.5px solid #fecaca; background:#fff5f5; color:#dc2626; font-size:.85rem; font-weight:600; font-family:inherit; cursor:pointer; }
        .sidebar-ft button:hover { background:#fee2e2; }
        .btn-menu { display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; flex-shrink:0; background:#fff; border:1.5px solid #e2e8f0; border-radius:10px; cursor:pointer; color:#64748b; }
        .btn-menu:hover { border-color:#fc5858; color:#fc5858; background:#fff1f1; }

        body { background:#f8fafc; }
        .cont-wrap { max-width:1180px; margin:0 auto; padding:24px 18px 64px; }
        .page-title { display:flex; align-items:center; gap:10px; font-size:1.15rem; font-weight:700; color:#1e293b; margin:4px 0 18px; }
        .page-title .muted { font-size:.8rem; font-weight:500; color:#94a3b8; }

        .v-loading { padding:48px 16px; text-align:center; color:#64748b; font-size:.9rem; }
        .v-loading.hidden { display:none; }
        .v-error   { padding:14px 16px; border-radius:10px; background:#fef2f2; color:#b91c1c; font-size:.85rem; border:1.5px solid #fecaca; margin-bottom:14px; }
        .v-error.hidden { display:none; }

        /* KPI tiles */
        .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
        @media (max-width:760px) { .kpi-grid { grid-template-columns:1fr; } }
        .kpi { background:#fff; border:1.5px solid #e2e8f0; border-radius:14px; padding:14px 18px; display:flex; flex-direction:column; gap:4px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
        .kpi-label { font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#94a3b8; }
        .kpi-value { font-size:1.7rem; font-weight:800; color:#1e293b; line-height:1.05; }
        .kpi-sub { font-size:.74rem; color:#64748b; }
        .kpi-pendientes { border-top:3px solid #f59e0b; }
        .kpi-grabados   { border-top:3px solid #16a34a; }
        .kpi-total      { border-top:3px solid #6366f1; }

        /* Tabla */
        .cont-card { background:#fff; border:1.5px solid #e2e8f0; border-radius:14px; padding:0; box-shadow:0 1px 3px rgba(0,0,0,.05); overflow:hidden; }
        .cont-toolbar { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid #f1f5f9; flex-wrap:wrap; }
        .cont-toolbar .search { flex:1; min-width:220px; max-width:360px; position:relative; }
        .cont-toolbar .search input { width:100%; padding:8px 12px 8px 32px; border:1.5px solid #e2e8f0; border-radius:8px; font-size:.86rem; font-family:inherit; }
        .cont-toolbar .search svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#94a3b8; }
        .filter-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; font-size:.8rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .filter-pill.active { background:#fff1f1; border-color:#fecaca; color:#dc2626; }
        .filter-pill .count { background:rgba(0,0,0,.08); padding:1px 7px; border-radius:9px; font-size:.7rem; }

        .cont-table { width:100%; border-collapse:collapse; font-size:.86rem; }
        .cont-table th { text-align:left; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#94a3b8; padding:10px 14px; background:#f8fafc; border-bottom:1px solid #e2e8f0; }
        .cont-table td { padding:12px 14px; border-bottom:1px solid #f1f5f9; vertical-align:middle; }
        .cont-table tbody tr:hover { background:#fafbfc; }
        .cont-sociedad { font-weight:600; color:#1e293b; }
        .cont-cif { font-size:.74rem; color:#94a3b8; font-family:monospace; }
        .cont-iban { font-family:monospace; font-size:.82rem; color:#1e293b; }
        .cont-titular { font-size:.78rem; color:#64748b; }
        .cont-fecha { font-size:.74rem; color:#94a3b8; }

        /* Toggle A3 */
        .a3-toggle { position:relative; display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
        .a3-toggle input { position:absolute; opacity:0; width:0; height:0; }
        .a3-switch { width:42px; height:24px; background:#e2e8f0; border-radius:999px; position:relative; transition:background .2s; }
        .a3-switch::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; background:#fff; border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.18); transition:left .2s; }
        .a3-toggle input:checked + .a3-switch { background:#16a34a; }
        .a3-toggle input:checked + .a3-switch::after { left:21px; }
        .a3-toggle input:disabled + .a3-switch { opacity:.5; cursor:wait; }
        .a3-label { font-size:.78rem; font-weight:600; color:#64748b; }
        .a3-toggle input:checked ~ .a3-label { color:#15803d; }

        .empty { text-align:center; padding:48px 18px; color:#94a3b8; font-size:.9rem; }
        .empty .icon { font-size:2.4rem; margin-bottom:10px; opacity:.6; }

        /* Botón "Ver" en cada fila */
        .cont-ver-btn {
            border:1.5px solid #e2e8f0; background:#fff; color:#475569;
            padding:5px 11px; border-radius:8px; font-size:.74rem; font-weight:600;
            cursor:pointer; font-family:inherit;
        }
        .cont-ver-btn:hover { border-color:#fc5858; color:#fc5858; background:#fff1f1; }

        /* Modal mandato SEPA */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(15,23,42,.55); backdrop-filter:blur(3px);
            z-index:800; display:flex; align-items:center; justify-content:center; padding:20px;
            opacity:0; pointer-events:none; transition:opacity .2s;
        }
        .modal-overlay.open { opacity:1; pointer-events:auto; }
        .modal {
            background:#fff; border-radius:14px; max-width:880px; width:100%; max-height:92vh;
            overflow:auto; box-shadow:0 12px 48px rgba(0,0,0,.25);
        }
        .modal-hd {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 22px; border-bottom:1px solid #e2e8f0; position:sticky; top:0; background:#fff; z-index:1;
        }
        .modal-hd h3 { margin:0; font-size:1rem; color:#1e293b; }
        .modal-actions { display:flex; gap:8px; }
        .modal-btn {
            border:1.5px solid #e2e8f0; background:#fff; color:#475569;
            padding:7px 13px; border-radius:8px; font-size:.82rem; font-weight:600;
            cursor:pointer; font-family:inherit;
        }
        .modal-btn:hover { border-color:#94a3b8; color:#1e293b; }
        .modal-btn.primary { background:#fc5858; border-color:#fc5858; color:#fff; }
        .modal-btn.primary:hover { background:#e64545; border-color:#e64545; color:#fff; }

        /* Documento mandato SEPA — formato bancario */
        #sepa-doc { padding:24px 30px; font-family:'Helvetica',Arial,sans-serif; color:#0f172a; }
        #sepa-doc h2 { font-size:1.1rem; text-align:center; margin:0 0 4px; }
        #sepa-doc .doc-sub { text-align:center; font-style:italic; color:#475569; font-size:.78rem; margin:0 0 14px; }
        .doc-block { border:1.5px solid #1e3a8a; border-radius:6px; padding:0; margin:10px 0; }
        .doc-block-label {
            display:block;
            background:#1e3a8a; color:#fff;
            font-size:.66rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
            padding:5px 12px; border-radius:5px 5px 0 0;
        }
        .doc-block-body { padding:10px 14px; }
        .doc-row { display:grid; grid-template-columns:200px 1fr; gap:4px 16px; padding:5px 0; border-bottom:1px dotted #cbd5e1; font-size:.84rem; }
        .doc-row:last-child { border-bottom:none; }
        .doc-row .lbl { font-weight:600; color:#1e3a8a; font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; align-self:center; }
        .doc-row .val { color:#0f172a; word-break:break-word; }
        .doc-row .val.mono { font-family:monospace; font-size:.9rem; letter-spacing:.04em; }
        .doc-legal { font-size:.7rem; color:#475569; line-height:1.5; padding:8px 12px; background:#fffbeb; border:1px solid #fde68a; border-radius:6px; margin:10px 0; }
        .doc-legal strong { color:#92400e; }
        .doc-legal-en { display:block; color:#94a3b8; font-style:italic; margin-top:5px; font-size:.66rem; }
        .doc-pago { display:flex; gap:24px; padding:6px 0; font-size:.84rem; }
        .doc-pago strong { color:#1e3a8a; }
        .doc-pago .check { display:inline-block; width:13px; height:13px; border:1.5px solid #1e3a8a; border-radius:3px; margin-right:6px; vertical-align:middle; text-align:center; font-size:.76rem; color:#1e3a8a; line-height:13px; }
        .doc-firma { margin-top:12px; }
        .doc-firma-box { border:1px solid #94a3b8; border-radius:6px; padding:8px; background:#fff; min-height:100px; display:flex; align-items:center; justify-content:center; }
        .doc-firma-box img { max-width:100%; max-height:120px; }
        .doc-fechafirma { font-size:.72rem; color:#94a3b8; margin-top:5px; text-align:right; }
        .doc-foot { font-size:.68rem; color:#475569; text-align:center; margin-top:14px; }

        /* Estilos sólo para imprimir/PDF: una sola hoja A4 sin márgenes raros. */
        @page { size: A4 portrait; margin: 10mm; }
        @media print {
            html, body { background:#fff !important; margin:0 !important; padding:0 !important; }
            body * { visibility: hidden !important; }
            #sepa-doc, #sepa-doc * { visibility: visible !important; }
            #sepa-doc {
                position: absolute !important;
                left: 0 !important; top: 0 !important;
                width: 100% !important;
                margin: 0 !important; padding: 0 !important;
                font-size: 10.5pt;
            }
            #sepa-doc h2 { font-size: 14pt; margin: 0 0 2pt; }
            #sepa-doc .doc-sub { font-size: 9pt; margin: 0 0 8pt; }
            .doc-block { margin: 5pt 0; page-break-inside: avoid; }
            .doc-block-body { padding: 6pt 10pt; }
            .doc-row { padding: 3pt 0; font-size: 9.5pt; grid-template-columns: 170pt 1fr; }
            .doc-row .lbl { font-size: 8pt; }
            .doc-legal { font-size: 8pt; padding: 6pt 10pt; margin: 6pt 0; page-break-inside: avoid; }
            .doc-legal-en { font-size: 7.5pt; }
            .doc-firma { page-break-inside: avoid; }
            .doc-firma-box { min-height: 70pt; }
            .doc-firma-box img { max-height: 80pt; }
            .doc-foot { font-size: 7.5pt; margin-top: 8pt; }
            .modal-overlay { position:static !important; padding:0 !important; background:none !important; }
            .modal { box-shadow:none !important; max-height:none !important; max-width:none !important; }
            .modal-hd { display:none !important; }
        }
    </style>
</head>
<body>

<header class="page-header">
    <button class="btn-menu" onclick="openSidebar()" title="Menú">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <img class="brand-logo" src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest">
    <h1>Contabilidad — Grabar en A3</h1>
</header>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar"></nav>
<script src="sidebar.js"></script>
<script>YurestSidebar.render('contabilidad');</script>

<div class="cont-wrap">

    <div class="page-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fc5858" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        Pendientes de A3
        <span class="muted" id="cont-subtitle">Cargando…</span>
    </div>

    <div id="cont-error" class="v-error hidden"></div>
    <div id="cont-loading" class="v-loading">Cargando datos…</div>

    <div id="cont-content" style="display:none">

        <!-- KPIs -->
        <div class="kpi-grid">
            <div class="kpi kpi-pendientes">
                <span class="kpi-label">Pendientes de grabar en A3</span>
                <span class="kpi-value" id="kpi-pendientes">—</span>
                <span class="kpi-sub" id="kpi-pendientes-sub"></span>
            </div>
            <div class="kpi kpi-grabados">
                <span class="kpi-label">Ya grabados en A3</span>
                <span class="kpi-value" id="kpi-grabados">—</span>
                <span class="kpi-sub" id="kpi-grabados-sub"></span>
            </div>
            <div class="kpi kpi-total">
                <span class="kpi-label">Fichas con SEPA firmado</span>
                <span class="kpi-value" id="kpi-total">—</span>
                <span class="kpi-sub muted">solo entran las que tienen mandato</span>
            </div>
        </div>

        <!-- Tabla -->
        <div class="cont-card">
            <div class="cont-toolbar">
                <div class="search">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input id="cont-search" type="search" placeholder="Buscar sociedad, CIF, IBAN…" oninput="aplicarFiltrosA3()">
                </div>
                <button class="filter-pill active" data-filter="pendientes" onclick="setFiltroA3('pendientes')">Pendientes <span class="count" id="filt-pendientes">0</span></button>
                <button class="filter-pill" data-filter="grabados" onclick="setFiltroA3('grabados')">Grabados <span class="count" id="filt-grabados">0</span></button>
                <button class="filter-pill" data-filter="todos" onclick="setFiltroA3('todos')">Todas <span class="count" id="filt-todos">0</span></button>
            </div>
            <div id="cont-table-wrap"></div>
        </div>

    </div>
</div>

<!-- Modal vista mandato SEPA -->
<div class="modal-overlay" id="sepa-modal" onclick="if(event.target===this)cerrarSepaModal()">
    <div class="modal">
        <div class="modal-hd">
            <h3>Mandato SEPA</h3>
            <div class="modal-actions">
                <button class="modal-btn" onclick="cerrarSepaModal()">Cerrar</button>
                <button class="modal-btn primary" onclick="imprimirSepa()">📄 Descargar PDF</button>
            </div>
        </div>
        <div id="sepa-doc"></div>
    </div>
</div>

<script>
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });
</script>

<script>
'use strict';
(function(){
    const E = YurestConfig.ENDPOINTS;
    const els = {
        loading: document.getElementById('cont-loading'),
        error:   document.getElementById('cont-error'),
        content: document.getElementById('cont-content'),
        sub:     document.getElementById('cont-subtitle'),
        wrap:    document.getElementById('cont-table-wrap')
    };

    let fichas = [];
    let filtroActivo = 'pendientes';

    function esc(s) {
        return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }
    function mostrarError(msg) {
        els.error.textContent = msg;
        els.error.classList.remove('hidden');
    }
    function parseSepa(raw) {
        if (!raw) return null;
        if (typeof raw === 'object') return raw;
        if (typeof raw === 'string') {
            try { return JSON.parse(raw); } catch (_) { return null; }
        }
        return null;
    }
    function fmtIban(v) {
        const s = String(v || '').replace(/\s+/g, '').toUpperCase();
        return s.replace(/(.{4})/g, '$1 ').trim() || '—';
    }
    function fmtFecha(v) {
        if (!v) return '—';
        const d = new Date(v);
        return isNaN(d) ? '—' : d.toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric' });
    }

    function mostrarToast(msg, tipo = 'success', ms = 3500) {
        let host = document.getElementById('toast-host');
        if (!host) {
            host = document.createElement('div');
            host.id = 'toast-host';
            host.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
            document.body.appendChild(host);
        }
        const colors = {
            success: { bg:'#dcfce7', border:'#86efac', color:'#15803d', icon:'✓' },
            warning: { bg:'#fef3c7', border:'#fcd34d', color:'#b45309', icon:'⚠' },
            error:   { bg:'#fee2e2', border:'#fca5a5', color:'#b91c1c', icon:'✕' }
        };
        const c = colors[tipo] || colors.success;
        const t = document.createElement('div');
        t.style.cssText = `background:${c.bg};color:${c.color};border:1.5px solid ${c.border};padding:10px 16px;border-radius:10px;font-size:.86rem;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.10);display:flex;gap:10px;align-items:center;pointer-events:auto`;
        t.innerHTML = `<span style="font-weight:700;font-size:1rem">${c.icon}</span><span>${esc(msg)}</span>`;
        host.appendChild(t);
        setTimeout(() => { t.style.transition='opacity .25s'; t.style.opacity='0'; setTimeout(()=>t.remove(),250); }, ms);
    }

    async function cargar() {
        try {
            const res = await YurestConfig.apiFetch(E.altas, { method: 'GET' });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            const lista = Array.isArray(data) ? data : (data.clientes || data.data || []);
            // Solo fichas que tengan mandato SEPA firmado (es lo que pide Contabilidad).
            fichas = lista
                .map(f => ({ ...f, _sepa: parseSepa(f.sepa_mandato || f.SEPA) }))
                .filter(f => f._sepa && f._sepa.firma_base64);
            els.loading.classList.add('hidden');
            els.content.style.display = '';
            render();
        } catch (err) {
            els.loading.classList.add('hidden');
            mostrarError('No se pudieron cargar las fichas: ' + err.message);
        }
    }

    function render() {
        const total = fichas.length;
        const pend  = fichas.filter(f => !f.grabado_a3).length;
        const grab  = total - pend;
        document.getElementById('kpi-pendientes').textContent = pend;
        document.getElementById('kpi-grabados').textContent   = grab;
        document.getElementById('kpi-total').textContent      = total;
        document.getElementById('kpi-pendientes-sub').textContent = pend === 0 ? 'Todo al día 🎉' : (pend === 1 ? '1 ficha por grabar' : `${pend} fichas por grabar`);
        document.getElementById('kpi-grabados-sub').textContent   = grab === 0 ? 'Aún ninguna' : `${grab} ya en A3`;

        document.getElementById('filt-pendientes').textContent = pend;
        document.getElementById('filt-grabados').textContent   = grab;
        document.getElementById('filt-todos').textContent      = total;

        els.sub.textContent = total === 0 ? 'sin fichas con mandato SEPA' : `${total} ficha${total === 1 ? '' : 's'} con SEPA`;

        // Badge sidebar (pendientes)
        const badge = document.getElementById('badge-a3');
        if (badge) badge.textContent = pend > 0 ? String(pend) : '';

        aplicarFiltrosA3();
    }

    function setFiltroA3(f) {
        filtroActivo = f;
        document.querySelectorAll('.filter-pill').forEach(p => {
            p.classList.toggle('active', p.dataset.filter === f);
        });
        aplicarFiltrosA3();
    }
    window.setFiltroA3 = setFiltroA3;

    function aplicarFiltrosA3() {
        const q = (document.getElementById('cont-search').value || '').toLowerCase().trim();
        const filtradas = fichas.filter(f => {
            if (filtroActivo === 'pendientes' && f.grabado_a3) return false;
            if (filtroActivo === 'grabados'   && !f.grabado_a3) return false;
            if (q) {
                const blob = [
                    f.denominacion,
                    f.cif,
                    f._sepa?.iban,
                    f._sepa?.deudor?.nombre
                ].filter(Boolean).join(' ').toLowerCase();
                if (!blob.includes(q)) return false;
            }
            return true;
        });
        renderTabla(filtradas);
    }
    window.aplicarFiltrosA3 = aplicarFiltrosA3;

    function renderTabla(items) {
        if (!items.length) {
            els.wrap.innerHTML = `<div class="empty"><div class="icon">📒</div>No hay fichas en este estado.</div>`;
            return;
        }
        const rows = items.map(f => {
            const sepa = f._sepa || {};
            const titular = sepa.deudor?.nombre || '—';
            const checked = f.grabado_a3 ? 'checked' : '';
            const fechaSepa = fmtFecha(sepa.firmado_at || sepa.fecha_firma);
            const fechaA3   = f.grabado_a3 ? `<span class="cont-fecha">${fmtFecha(f.grabado_a3_at)}</span>` : '';
            return `
                <tr data-id="${esc(f.id)}">
                    <td>
                        <div class="cont-sociedad">${esc(f.denominacion || '—')}</div>
                        ${f.cif ? `<div class="cont-cif">${esc(f.cif)}</div>` : ''}
                    </td>
                    <td>
                        <div class="cont-iban">${esc(fmtIban(sepa.iban))}</div>
                        <div class="cont-titular">Titular: ${esc(titular)}</div>
                    </td>
                    <td><span class="cont-fecha">${fechaSepa}</span></td>
                    <td><button class="cont-ver-btn" onclick="abrirSepaModal('${esc(f.id)}')">📄 Ver mandato</button></td>
                    <td>
                        <label class="a3-toggle">
                            <input type="checkbox" ${checked} onchange="toggleA3(this, '${esc(f.id)}')">
                            <span class="a3-switch"></span>
                            <span class="a3-label">${f.grabado_a3 ? 'Grabado' : 'Pendiente'}</span>
                        </label>
                        ${fechaA3}
                    </td>
                </tr>`;
        }).join('');

        els.wrap.innerHTML = `
            <table class="cont-table">
                <thead>
                    <tr>
                        <th>Sociedad</th>
                        <th>IBAN · Titular</th>
                        <th>SEPA firmado</th>
                        <th>Mandato</th>
                        <th>Estado A3</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    // ── Modal mandato SEPA + impresión PDF ─────────────────────────────────
    function abrirSepaModal(fichaId) {
        const f = fichas.find(x => x.id === fichaId);
        if (!f || !f._sepa) {
            mostrarToast('Esta ficha no tiene mandato SEPA', 'warning');
            return;
        }
        const s = f._sepa;
        const a = s.acreedor || {};
        const d = s.deudor || {};
        const tipoRecur = s.tipo_pago === 'unico'
            ? { rec: '', uni: '✓' }
            : { rec: '✓', uni: '' };
        document.getElementById('sepa-doc').innerHTML = `
            <h2>Orden de domiciliación de adeudo directo SEPA</h2>
            <p class="doc-sub">SEPA Direct Debit Mandate</p>

            <div class="doc-block">
                <span class="doc-block-label">A cumplimentar por el acreedor / To be completed by the creditor</span>
                <div class="doc-block-body">
                    <div class="doc-row"><span class="lbl">Referencia</span><span class="val mono">${esc(s.referencia || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">Identificador del acreedor</span><span class="val mono">${esc(a.identificador || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">Nombre del acreedor</span><span class="val">${esc(a.nombre || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">Dirección</span><span class="val">${esc(a.direccion || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">CP · Población · Provincia</span><span class="val">${esc([a.cp, a.poblacion, a.provincia].filter(Boolean).join(' · ') || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">País</span><span class="val">${esc(a.pais || '—')}</span></div>
                </div>
            </div>

            <div class="doc-legal">
                Mediante la firma de esta orden de domiciliación, el deudor autoriza (A) al acreedor a enviar instrucciones a la entidad del deudor para adeudar su cuenta y (B) a la entidad para efectuar los adeudos en su cuenta siguiendo las instrucciones del acreedor. Como parte de sus derechos, el deudor está legitimado al reembolso por su entidad en los términos y condiciones del contrato suscrito con la misma. <strong>La solicitud de reembolso deberá efectuarse dentro de las ocho semanas que siguen a la fecha de adeudo en cuenta.</strong>
                <span class="doc-legal-en">By signing this mandate form, you authorise (A) the Creditor to send instructions to your bank to debit your account and (B) your bank to debit your account in accordance with the instructions from the Creditor. A refund must be claimed within eight weeks starting from the date on which your account was debited.</span>
            </div>

            <div class="doc-block">
                <span class="doc-block-label">A cumplimentar por el deudor / To be completed by the debtor</span>
                <div class="doc-block-body">
                    <div class="doc-row"><span class="lbl">Nombre del deudor</span><span class="val">${esc(d.nombre || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">Dirección del deudor</span><span class="val">${esc(d.direccion || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">CP · Población · Provincia</span><span class="val">${esc([d.cp, d.poblacion, d.provincia].filter(Boolean).join(' · ') || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">País del deudor</span><span class="val">${esc(d.pais || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">Swift BIC</span><span class="val mono">${esc(s.swift || '—')}</span></div>
                    <div class="doc-row"><span class="lbl">Número de cuenta IBAN</span><span class="val mono">${esc(fmtIban(s.iban))}</span></div>
                </div>
            </div>

            <div class="doc-pago">
                <span><strong>Tipo de pago / Type of payment:</strong></span>
                <span><span class="check">${tipoRecur.rec}</span>Pago recurrente</span>
                <span><span class="check">${tipoRecur.uni}</span>Pago único</span>
            </div>

            <div class="doc-row" style="margin-top:14px;border:none">
                <span class="lbl">Fecha · Localidad</span>
                <span class="val">${esc([fmtFecha(s.fecha_firma), s.localidad].filter(Boolean).join(' · ') || '—')}</span>
            </div>

            <div class="doc-firma">
                <div style="font-size:.74rem;font-weight:700;color:#1e3a8a;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Firma del deudor / Signature of the debtor</div>
                <div class="doc-firma-box">
                    ${s.firma_base64 ? `<img src="${s.firma_base64}" alt="Firma">` : '<span style="color:#94a3b8;font-size:.8rem">Sin firma</span>'}
                </div>
                <div class="doc-fechafirma">${s.firmado_at ? 'Firmado el ' + new Date(s.firmado_at).toLocaleString('es-ES') : ''}</div>
            </div>

            <p class="doc-foot">Todos los campos han sido cumplimentados. Este documento debe ser custodiado por el acreedor.</p>
        `;
        document.getElementById('sepa-modal').classList.add('open');
    }
    window.abrirSepaModal = abrirSepaModal;

    function cerrarSepaModal() {
        document.getElementById('sepa-modal').classList.remove('open');
    }
    window.cerrarSepaModal = cerrarSepaModal;

    function imprimirSepa() {
        // Usa el diálogo nativo del navegador → "Guardar como PDF" siempre
        // disponible. CSS @media print oculta todo menos #sepa-doc.
        window.print();
    }
    window.imprimirSepa = imprimirSepa;

    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarSepaModal(); });

    async function toggleA3(input, id) {
        const valor = input.checked;
        input.disabled = true;
        try {
            const res = await YurestConfig.apiFetch(E.grabadoA3, {
                method: 'POST',
                body: JSON.stringify({ id, grabado_a3: valor })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const body = await res.json().catch(() => ({}));
            if (body && body.success === false) {
                const detalle = (body.errores || []).join(' · ') || 'no se actualizó la fila';
                throw new Error(detalle);
            }
            const f = fichas.find(x => x.id === id);
            if (f) {
                f.grabado_a3 = valor;
                f.grabado_a3_at = valor ? new Date().toISOString() : null;
            }
            mostrarToast(valor ? 'Marcada como grabada en A3' : 'Marcada como pendiente', 'success');
            render();
        } catch (err) {
            input.checked = !valor;
            mostrarToast('No se pudo actualizar: ' + err.message, 'error', 5000);
        } finally {
            input.disabled = false;
        }
    }
    window.toggleA3 = toggleA3;

    cargar();
})();
</script>
</body>
</html>
