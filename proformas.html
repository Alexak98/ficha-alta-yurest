<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Solicitud de proformas — Yurest</title>
    <script src="config.js"></script>
    <script>YurestConfig.requireAuth('proformas');</script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background:#f8fafc; }
        .cont-wrap { max-width:1180px; margin:0 auto; padding:24px 18px 64px; }
        .page-title { display:flex; align-items:center; gap:10px; font-size:1.15rem; font-weight:700; color:#1e293b; margin:4px 0 10px; }
        .page-title .muted { font-size:.8rem; font-weight:500; color:#94a3b8; }

        /* Tarjetas de pedidos de hardware */
        .hw-pedido {
            background:#fff; border:1px solid #e2e8f0; border-radius:10px;
            padding:14px 16px; margin:10px 14px; display:flex; flex-direction:column; gap:10px;
        }
        .hw-pedido-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
        .hw-pedido-cliente { font-size:.95rem; font-weight:700; color:#0f172a; margin:0; }
        .hw-pedido-sub { font-size:.74rem; color:#64748b; margin-top:2px; }
        .hw-pedido-estado {
            font-size:.66rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase;
            padding:4px 9px; border-radius:999px; flex-shrink:0;
        }
        .est-solicitada         { background:#fef3c7; color:#92400e; }
        .est-proforma_adjuntada { background:#dbeafe; color:#1e40af; }
        .est-pendiente_confirmar{ background:#fee2e2; color:#991b1b; }
        .est-lista_envio        { background:#dcfce7; color:#15803d; }
        .hw-pedido-items { background:#f8fafc; border:1px solid #e2e8f0; border-radius:6px; padding:6px 10px; font-size:.8rem; color:#334155; }
        .hw-pedido-item-row { display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px dotted #e2e8f0; }
        .hw-pedido-item-row:last-child { border-bottom:none; }
        .hw-pedido-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .hw-cta {
            padding:6px 12px; font-size:.76rem; font-weight:600; border-radius:7px;
            cursor:pointer; font-family:inherit; border:1.5px solid #e2e8f0; background:#fff; color:#475569;
            display:inline-flex; align-items:center; gap:5px; text-decoration:none;
        }
        .hw-cta:hover { border-color:#fc5858; color:#fc5858; }
        .hw-cta.primary { background:#fc5858; color:#fff; border-color:#fc5858; }
        .hw-cta.primary:hover { background:#e84848; }
        .hw-cta.success { background:#16a34a; color:#fff; border-color:#16a34a; }
        .hw-cta.success:hover { background:#15803d; }
        .hw-cta input[type="file"] { display:none; }
        .hw-empty { text-align:center; padding:40px 20px; color:#94a3b8; }

        .v-loading { padding:48px 16px; text-align:center; color:#64748b; font-size:.9rem; }
        .v-loading.hidden { display:none; }
        .v-error   { padding:14px 16px; border-radius:10px; background:#fef2f2; color:#b91c1c; font-size:.85rem; border:1.5px solid #fecaca; margin-bottom:14px; }
        .v-error.hidden { display:none; }

        /* KPI tiles */
        .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
        @media (max-width:760px) { .kpi-grid { grid-template-columns:1fr; } }
        .kpi { background:#fff; border:1.5px solid #e2e8f0; border-radius:14px; padding:14px 18px; display:flex; flex-direction:column; gap:4px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
        .kpi-label { font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#94a3b8; }
        .kpi-value { font-size:1.7rem; font-weight:800; color:#1e293b; line-height:1.05; }
        .kpi-sub { font-size:.74rem; color:#64748b; }
        .kpi-pendientes { border-top:3px solid #f59e0b; }
        .kpi-grabados   { border-top:3px solid #16a34a; }
        .kpi-total      { border-top:3px solid #6366f1; }

        /* Toolbar + filtros */
        .cont-card { background:#fff; border:1.5px solid #e2e8f0; border-radius:14px; padding:0; box-shadow:0 1px 3px rgba(0,0,0,.05); overflow:hidden; }
        .cont-toolbar { display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid #f1f5f9; flex-wrap:wrap; }
        .filter-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; font-size:.8rem; font-weight:600; cursor:pointer; font-family:inherit; }
        .filter-pill.active { background:#fff1f1; border-color:#fecaca; color:#dc2626; }
        .filter-pill .count { background:rgba(0,0,0,.08); padding:1px 7px; border-radius:9px; font-size:.7rem; }
    </style>
</head>
<body>

<header class="page-header">
    <button class="btn-menu" onclick="openSidebar()" title="Menú">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <img class="brand-logo" src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest">
    <h1>Solicitud de proformas</h1>
</header>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<nav class="sidebar" id="sidebar"></nav>
<script src="sidebar.js"></script>
<script>YurestSidebar.render('proformas');</script>

<div class="cont-wrap">

    <div class="page-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fc5858" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
        <span>Solicitud de proformas</span>
        <span class="muted" id="cont-subtitle">Cargando…</span>
    </div>

    <div id="cont-error" class="v-error hidden"></div>
    <div id="cont-loading" class="v-loading">Cargando pedidos…</div>

    <div id="cont-content" style="display:none">
        <div class="kpi-grid">
            <div class="kpi kpi-pendientes">
                <span class="kpi-label">Proformas pendientes de emitir</span>
                <span class="kpi-value" id="kpi-proformas-solicitadas">—</span>
                <span class="kpi-sub muted">implementadores esperando PDF</span>
            </div>
            <div class="kpi kpi-grabados">
                <span class="kpi-label">Pagos por confirmar</span>
                <span class="kpi-value" id="kpi-proformas-pendientes">—</span>
                <span class="kpi-sub muted">justificante subido por el implementador</span>
            </div>
            <div class="kpi kpi-total">
                <span class="kpi-label">Listas para envío</span>
                <span class="kpi-value" id="kpi-proformas-listas">—</span>
                <span class="kpi-sub muted">visibles en Soporte · Hardware envíos</span>
            </div>
        </div>

        <div class="cont-card">
            <div class="cont-toolbar">
                <button class="filter-pill active" data-filter-proforma="solicitada" onclick="setFiltroProforma('solicitada')">Por emitir <span class="count" id="filt-prof-sol">0</span></button>
                <button class="filter-pill" data-filter-proforma="pendiente_confirmar" onclick="setFiltroProforma('pendiente_confirmar')">Pendientes pago <span class="count" id="filt-prof-pend">0</span></button>
                <button class="filter-pill" data-filter-proforma="proforma_adjuntada" onclick="setFiltroProforma('proforma_adjuntada')">Proforma enviada <span class="count" id="filt-prof-env">0</span></button>
                <button class="filter-pill" data-filter-proforma="lista_envio" onclick="setFiltroProforma('lista_envio')">Confirmadas <span class="count" id="filt-prof-listas">0</span></button>
            </div>
            <div id="proformas-wrap"></div>
        </div>
    </div>
</div>

<script>
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });
</script>

<script>
'use strict';
(function(){
    const EP_HW = YurestConfig.ENDPOINTS.hardwarePedidos;
    const esc = YurestConfig.escHtml;

    const els = {
        loading:  document.getElementById('cont-loading'),
        error:    document.getElementById('cont-error'),
        content:  document.getElementById('cont-content'),
        sub:      document.getElementById('cont-subtitle'),
        wrap:     document.getElementById('proformas-wrap')
    };

    let pedidos = [];
    let filtroProforma = 'solicitada';

    function mostrarError(msg) {
        els.error.textContent = msg;
        els.error.classList.remove('hidden');
    }

    function mostrarToast(msg, tipo = 'success', ms = 3500) {
        let host = document.getElementById('toast-host');
        if (!host) {
            host = document.createElement('div');
            host.id = 'toast-host';
            host.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none';
            document.body.appendChild(host);
        }
        const colors = {
            success: { bg:'#dcfce7', border:'#86efac', color:'#15803d', icon:'✓' },
            warning: { bg:'#fef3c7', border:'#fcd34d', color:'#b45309', icon:'⚠' },
            error:   { bg:'#fee2e2', border:'#fca5a5', color:'#b91c1c', icon:'✕' }
        };
        const c = colors[tipo] || colors.success;
        const t = document.createElement('div');
        t.style.cssText = `background:${c.bg};color:${c.color};border:1.5px solid ${c.border};padding:10px 16px;border-radius:10px;font-size:.86rem;font-weight:500;box-shadow:0 4px 14px rgba(0,0,0,.10);display:flex;gap:10px;align-items:center;pointer-events:auto`;
        t.innerHTML = `<span style="font-weight:700;font-size:1rem">${c.icon}</span><span>${esc(msg)}</span>`;
        host.appendChild(t);
        setTimeout(() => { t.style.transition='opacity .25s'; t.style.opacity='0'; setTimeout(()=>t.remove(),250); }, ms);
    }

    async function cargarPedidos() {
        try {
            const url = EP_HW + (EP_HW.includes('?') ? '&' : '?') + '_=' + Date.now();
            const res = await YurestConfig.apiFetch(url, {
                method: 'GET',
                headers: { 'Cache-Control': 'no-cache' }
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            pedidos = Array.isArray(data.pedidos) ? data.pedidos
                    : Array.isArray(data) ? data : [];
            els.loading.classList.add('hidden');
            els.content.style.display = '';
            renderProformas();
        } catch (err) {
            els.loading.classList.add('hidden');
            mostrarError('No se pudieron cargar los pedidos: ' + err.message);
        }
    }

    function setFiltroProforma(f) {
        filtroProforma = f;
        document.querySelectorAll('[data-filter-proforma]').forEach(p =>
            p.classList.toggle('active', p.dataset.filterProforma === f)
        );
        renderProformas();
    }
    window.setFiltroProforma = setFiltroProforma;

    function renderProformas() {
        // Contadores por estado (actualizan las pills + KPIs).
        const porEstado = {
            solicitada: 0, proforma_adjuntada: 0, pendiente_confirmar: 0, lista_envio: 0
        };
        pedidos.forEach(p => {
            if (porEstado[p.estado] !== undefined) porEstado[p.estado]++;
        });
        document.getElementById('filt-prof-sol').textContent    = porEstado.solicitada;
        document.getElementById('filt-prof-pend').textContent   = porEstado.pendiente_confirmar;
        document.getElementById('filt-prof-env').textContent    = porEstado.proforma_adjuntada;
        document.getElementById('filt-prof-listas').textContent = porEstado.lista_envio;
        document.getElementById('kpi-proformas-solicitadas').textContent = porEstado.solicitada;
        document.getElementById('kpi-proformas-pendientes').textContent  = porEstado.pendiente_confirmar;
        document.getElementById('kpi-proformas-listas').textContent      = porEstado.lista_envio;

        // Badge del sidebar = acción requerida por contabilidad
        // (solicitadas + pendientes de confirmar).
        const accionReq = porEstado.solicitada + porEstado.pendiente_confirmar;
        const badge = document.getElementById('badge-proformas');
        if (badge) {
            badge.textContent = accionReq > 0 ? String(accionReq) : '';
            if (typeof window._actualizarSidebarBadgesGrupos === 'function') {
                window._actualizarSidebarBadgesGrupos();
            }
        }
        els.sub.textContent = pedidos.length === 0
            ? 'sin pedidos aún'
            : `${pedidos.length} pedido${pedidos.length === 1 ? '' : 's'} · ${accionReq} requieren acción`;

        const lista = pedidos.filter(p => p.estado === filtroProforma);
        const wrap = els.wrap;
        if (lista.length === 0) {
            wrap.innerHTML = `<div class="hw-empty">Sin pedidos en este estado.</div>`;
            return;
        }
        const ESTADO_LBL = {
            solicitada:          'Por emitir',
            proforma_adjuntada:  'Proforma enviada',
            pendiente_confirmar: 'Pendiente confirmar',
            lista_envio:         'Lista envío'
        };
        wrap.innerHTML = lista.map(p => {
            const items = Array.isArray(p.items) ? p.items : [];
            const fmtPrecio = v => {
                const n = Number(v);
                if (!Number.isFinite(n)) return '—';
                return n.toLocaleString('es-ES', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
            };
            let subtotal = 0, tienePrecios = false;
            items.forEach(it => {
                if (Number.isFinite(+it.precio_total))         { subtotal += +it.precio_total;    tienePrecios = true; }
                else if (Number.isFinite(+it.precio_unitario)) { subtotal += (+it.precio_unitario) * (Number(it.cantidad) || 1); tienePrecios = true; }
            });
            const itemsHtml = items.map(it => {
                const cant = Number(it.cantidad) || 1;
                const unidad = esc(it.unidad || 'ud');
                const precioUnit = Number.isFinite(+it.precio_unitario) ? fmtPrecio(it.precio_unitario) : null;
                const precioTot  = Number.isFinite(+it.precio_total)    ? fmtPrecio(it.precio_total)
                                 : (precioUnit ? fmtPrecio((+it.precio_unitario) * cant) : null);
                return `
                    <div class="hw-pedido-item-row">
                        <span>
                            ${esc(it.nombre || '—')}
                            ${it.formato ? ` <span style="color:#94a3b8;font-size:.72rem">· ${esc(it.formato)}</span>` : ''}
                            ${precioUnit ? ` <span style="color:#94a3b8;font-size:.72rem">· ${precioUnit}/${unidad}</span>` : ''}
                        </span>
                        <span style="font-weight:700;color:#0369a1">${cant} ${unidad}${precioTot ? ` · ${precioTot}` : ''}</span>
                    </div>`;
            }).join('') || '<span style="color:#94a3b8">Sin items</span>';
            const subtotalHtml = tienePrecios
                ? `<div style="text-align:right;font-size:.82rem;color:#334155;padding:2px 2px 0"><strong>Subtotal: ${fmtPrecio(subtotal)}</strong></div>`
                : '';

            // Acciones disponibles según estado:
            //   solicitada         → subir proforma PDF
            //   pendiente_confirmar → ver proforma + justificante + confirmar pago
            //   proforma_adjuntada / lista_envio → ver adjuntos (solo lectura)
            let acciones = '';
            if (p.estado === 'solicitada') {
                acciones = `
                    <label class="hw-cta primary">
                        📎 Adjuntar proforma
                        <input type="file" accept="application/pdf" onchange="subirProforma('${esc(p.id)}', this)">
                    </label>`;
            } else if (p.estado === 'pendiente_confirmar') {
                const prof = p.proforma_pdf && p.proforma_pdf.data
                    ? `<a href="${esc(p.proforma_pdf.data)}" download="${esc(p.proforma_pdf.nombre || 'proforma.pdf')}" class="hw-cta">📄 Proforma</a>`
                    : '';
                const just = p.justificante_pdf && p.justificante_pdf.data
                    ? `<a href="${esc(p.justificante_pdf.data)}" download="${esc(p.justificante_pdf.nombre || 'justificante.pdf')}" class="hw-cta">🧾 Justificante</a>`
                    : '';
                acciones = `${prof}${just}
                    <button class="hw-cta success" onclick="confirmarPago('${esc(p.id)}')">✓ Confirmar pago</button>`;
            } else if (p.estado === 'proforma_adjuntada') {
                const prof = p.proforma_pdf && p.proforma_pdf.data
                    ? `<a href="${esc(p.proforma_pdf.data)}" download="${esc(p.proforma_pdf.nombre || 'proforma.pdf')}" class="hw-cta">📄 Ver proforma enviada</a>`
                    : '';
                acciones = `${prof}<span style="font-size:.72rem;color:#64748b;align-self:center">Esperando justificante del implementador…</span>`;
            } else if (p.estado === 'lista_envio') {
                const prof = p.proforma_pdf && p.proforma_pdf.data
                    ? `<a href="${esc(p.proforma_pdf.data)}" download="${esc(p.proforma_pdf.nombre || 'proforma.pdf')}" class="hw-cta">📄 Proforma</a>`
                    : '';
                acciones = `${prof}<span style="font-size:.72rem;color:#16a34a;align-self:center">✓ En Soporte listo para envío</span>`;
            }

            const fmt = v => v ? new Date(v).toLocaleString('es-ES', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
            return `
                <div class="hw-pedido">
                    <div class="hw-pedido-head">
                        <div>
                            <p class="hw-pedido-cliente">${esc(p.cliente || '—')}</p>
                            <div class="hw-pedido-sub">
                                ${p.implementador ? 'Solicita: ' + esc(p.implementador) + ' · ' : ''}${fmt(p.solicitado_at)}
                            </div>
                        </div>
                        <span class="hw-pedido-estado est-${esc(p.estado)}">${esc(ESTADO_LBL[p.estado] || p.estado)}</span>
                    </div>
                    <div class="hw-pedido-items">${itemsHtml}</div>
                    ${subtotalHtml}
                    ${p.notas_implementador ? `<div style="font-size:.78rem;color:#475569;background:#fffbeb;border-left:3px solid #f59e0b;padding:6px 10px;border-radius:4px"><strong>Nota del implementador:</strong> ${esc(p.notas_implementador)}</div>` : ''}
                    <div class="hw-pedido-actions">${acciones}</div>
                </div>`;
        }).join('');
    }

    // Convierte un File a objeto { nombre, tipo, size, data(base64), fecha }.
    // Mismo formato que adjuntos de ficha.
    function _fileToObj(file) {
        return new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve({
                nombre: file.name,
                tipo:   file.type || 'application/pdf',
                size:   file.size,
                data:   r.result,
                fecha:  new Date().toISOString()
            });
            r.onerror = reject;
            r.readAsDataURL(file);
        });
    }

    async function subirProforma(pedidoId, input) {
        const file = input.files && input.files[0];
        if (!file) return;
        if (file.type !== 'application/pdf') {
            mostrarToast('El archivo debe ser un PDF', 'warning');
            input.value = '';
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            mostrarToast('PDF demasiado grande (máx 10 MB)', 'warning');
            input.value = '';
            return;
        }
        try {
            const proforma_pdf = await _fileToObj(file);
            const res = await YurestConfig.apiFetch(EP_HW, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'adjuntar_proforma',
                    pedido: { id: pedidoId, proforma_pdf }
                })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const r = await res.json();
            if (r && r.success === false) throw new Error((r.errores || ['Error']).join('; '));
            mostrarToast('Proforma enviada al implementador', 'success');
            await cargarPedidos();
        } catch (err) {
            mostrarToast('Error al adjuntar: ' + err.message, 'error', 5000);
        }
        input.value = '';
    }
    window.subirProforma = subirProforma;

    async function confirmarPago(pedidoId) {
        if (!confirm('¿Confirmar el pago? El pedido pasará a Soporte · Hardware envíos.')) return;
        try {
            const res = await YurestConfig.apiFetch(EP_HW, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'confirmar_pago',
                    pedido: { id: pedidoId }
                })
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            mostrarToast('Pago confirmado. Pedido disponible en Soporte.', 'success');
            await cargarPedidos();
        } catch (err) {
            mostrarToast('Error al confirmar: ' + err.message, 'error', 5000);
        }
    }
    window.confirmarPago = confirmarPago;

    cargarPedidos();
})();
</script>
</body>
</html>
