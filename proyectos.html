<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Proyectos</title>
    <script src="config.js"></script>
    <script>YurestConfig.requireAuth();</script>
    <link rel="stylesheet" href="css-gestor/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/es.js"></script>
    <style>
        .sidebar-group { margin: 2px 0; }
        .sidebar-group-header {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 18px; margin: 2px 10px;
            border-radius: 10px;
            font-size: 0.88rem; font-weight: 500; color: #334155;
            cursor: pointer; user-select: none;
            transition: background 0.14s, color 0.14s;
        }
        .sidebar-group-header:hover { background: #f8fafc; color: #1e293b; }
        .sidebar-group-header svg { flex-shrink: 0; opacity: 0.7; }
        .sidebar-group-chevron { margin-left: auto; transition: transform 0.18s; }
        .sidebar-group.open .sidebar-group-chevron { transform: rotate(90deg); }
        .sidebar-group-children { max-height: 0; overflow: hidden; transition: max-height 0.2s ease; }
        .sidebar-group.open .sidebar-group-children { max-height: 500px; }
        .sidebar-group-children .sidebar-item {
            padding-left: 44px; font-size: 0.84rem; position: relative;
        }
        .sidebar-group-children .sidebar-item::before {
            content: ''; position: absolute; left: 30px; top: 50%;
            width: 8px; height: 1.5px; background: #cbd5e1;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR NAVIGATION (shared with altas system) -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-hd">
            <div class="sidebar-brand"><span class="sidebar-brand-dot"></span> Yurest</div>
            <button class="sidebar-close" onclick="closeSidebar()">&#10005;</button>
        </div>
        <div class="sidebar-label">Secciones</div>
        <div class="sidebar-group" id="sidebar-group-informes">
            <div class="sidebar-group-header" onclick="document.getElementById('sidebar-group-informes').classList.toggle('open')">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 4 4 5-5"/></svg>
                Informes
                <svg class="sidebar-group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <div class="sidebar-group-children">
                <a href="distribucion.html" class="sidebar-item">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><circle cx="19" cy="6" r="2.5"/><circle cx="5" cy="6" r="2.5"/></svg>
                    Implementadores
                </a>
            </div>
        </div>
        <a href="lista.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Fichas de cliente
        </a>
        <a href="bajas.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Bajas
        </a>
        <a href="sinasignar.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/></svg>
            Sin asignar <span class="sidebar-badge" id="badge-sinasignar"></span>
        </a>
        <a href="proyectos.html" class="sidebar-item active">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
            Proyectos
        </a>
        <a href="integraciones.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Integraciones
        </a>
        <div class="sidebar-ft">
            <button onclick="closeSidebar()">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Cerrar menú
            </button>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <button class="btn-sidebar-toggle" onclick="openSidebar()" title="Menú">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <img class="header-logo-img" src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest">
            <h1>Gestor de Proyectos</h1>
        </div>
        <nav class="header-nav">
            <button class="nav-tab active" data-view="dashboard" onclick="cambiarVista('dashboard')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Dashboard
            </button>
            <button class="nav-tab" data-view="proyectos" onclick="cambiarVista('proyectos')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
                Proyectos
            </button>
        </nav>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="abrirModalProyecto()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Nuevo Proyecto
            </button>
        </div>
    </header>

    <!-- ======================== VIEW: DASHBOARD ======================== -->
    <div id="vista-dashboard" class="vista">
        <section class="dashboard-stats" id="dashboard-stats"></section>
        <section class="dashboard-filtered" id="dashboard-filtered" style="display:none">
            <div class="filtered-header">
                <h3 id="filtered-title">Proyectos</h3>
                <button class="btn btn-secondary btn-sm" onclick="cerrarFiltradoDashboard()">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Cerrar
                </button>
            </div>
            <div class="cards-grid" id="dashboard-cards"></div>
        </section>
    </div>

    <!-- ======================== VIEW: PROYECTOS ======================== -->
    <div id="vista-proyectos" class="vista" style="display:none">
        <!-- SEARCH + FILTERS -->
        <div class="filters-bar">
            <div class="search-group">
                <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="buscar-proyecto" class="search-input" placeholder="Buscar proyecto..." oninput="aplicarFiltros()">
            </div>
            <div class="filter-group">
                <div class="filter-pill filter-pill-multi" onclick="toggleImplDropdown(event)">
                    <svg class="filter-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span id="filtro-impl-label">Implementador</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:4px"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="filter-dropdown" id="filtro-impl-dropdown">
                    <div id="filtro-impl-checks"></div>
                </div>
            </div>
            <div class="filter-group">
                <div class="filter-pill filter-pill-multi" onclick="toggleTipoDropdown(event)">
                    <svg class="filter-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                    <span id="filtro-tipo-label">Tipo</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:4px"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="filter-dropdown" id="filtro-tipo-dropdown">
                    <div id="filtro-tipo-checks"></div>
                </div>
            </div>
            <div class="filter-group">
                <div class="filter-pill filter-pill-multi" onclick="toggleEstadoDropdown(event)">
                    <svg class="filter-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span id="filtro-estado-label">Estado</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-left:4px"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="filter-dropdown" id="filtro-estado-dropdown">
                    <div id="filtro-estado-checks"></div>
                </div>
            </div>
            <button class="filter-clear-btn" id="filter-clear-btn" onclick="limpiarFiltros()" style="display:none">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                Limpiar filtros
            </button>
            <div class="stats" id="stats"></div>
        </div>
        <main class="dashboard">
            <div class="cards-grid" id="cards-grid"></div>
        </main>
    </div>

    <!-- MODAL: Crear/Editar Proyecto -->
    <div class="modal-overlay" id="modal-proyecto" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-proyecto-titulo">Nuevo Proyecto</h2>
                <button class="modal-close" onclick="cerrarModal('modal-proyecto')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="proyecto-id">
                <div class="form-group">
                    <label>Cliente</label>
                    <input type="text" id="proyecto-cliente" class="form-control" placeholder="Nombre del cliente">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Implementador</label>
                        <select id="proyecto-implementador" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <label>Tipo</label>
                        <select id="proyecto-tipo" class="form-control"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="proyecto-estado" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <label>Fecha de inicio</label>
                        <input type="date" id="proyecto-fecha" class="form-control">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Integracion TPV</label>
                        <input type="text" id="proyecto-tpv" class="form-control" placeholder="Ej: Revo, Agora, Last...">
                    </div>
                </div>
                <div class="form-group" id="proyecto-plantilla-group">
                    <label>Plantilla</label>
                    <select id="proyecto-plantilla" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>Participantes</label>
                    <div class="participantes-input-row">
                        <input type="email" id="proyecto-participante-input" class="form-control" placeholder="email@ejemplo.com" onkeydown="if(event.key==='Enter'){event.preventDefault();agregarParticipanteProyecto()}">
                        <button class="btn btn-secondary btn-sm" type="button" onclick="agregarParticipanteProyecto()">+</button>
                    </div>
                    <div class="participantes-chips" id="proyecto-participantes-chips"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal('modal-proyecto')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarProyecto()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Detalle Proyecto (secciones + tareas) -->
    <div class="modal-overlay" id="modal-detalle" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal modal-detail">
            <div class="modal-header">
                <h2 id="detalle-titulo">Detalle del Proyecto</h2>
                <button class="modal-close" onclick="cerrarModal('modal-detalle')">&times;</button>
            </div>
            <div class="detail-tabs">
                <button class="detail-tab active" data-dtab="tareas" onclick="cambiarVistaDetalle('tareas')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                    Tareas
                </button>
                <button class="detail-tab" data-dtab="contactos" onclick="cambiarVistaDetalle('contactos')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    Contactos
                </button>
                <button class="detail-tab" data-dtab="desarrollos" onclick="cambiarVistaDetalle('desarrollos')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                    Desarrollos
                </button>
                <button class="detail-tab" data-dtab="anotaciones" onclick="cambiarVistaDetalle('anotaciones')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    Anotaciones
                </button>
            </div>
            <div class="modal-body">
                <div id="detalle-tareas" class="detail-view-panel"></div>
                <div id="detalle-contactos" class="detail-view-panel" style="display:none"></div>
                <div id="detalle-desarrollos" class="detail-view-panel" style="display:none"></div>
                <div id="detalle-anotaciones" class="detail-view-panel" style="display:none"></div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Tarea -->
    <div class="modal-overlay" id="modal-tarea" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-tarea-titulo">Editar Tarea</h2>
                <button class="modal-close" onclick="cerrarModal('modal-tarea')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="tarea-proyecto-id">
                <input type="hidden" id="tarea-seccion-nombre">
                <input type="hidden" id="tarea-id">
                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label>Nombre</label>
                        <input type="text" id="tarea-nombre" class="form-control">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Seccion</label>
                        <select id="tarea-seccion-destino" class="form-control"></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha de reunion</label>
                        <input type="text" id="tarea-fecha" class="form-control" placeholder="Seleccionar fecha" readonly>
                    </div>
                    <div class="form-group">
                        <label>Tiempo estimado (min)</label>
                        <input type="number" id="tarea-tiempo" class="form-control" placeholder="60" min="0">
                    </div>
                </div>
                <div class="form-group">
                    <label>Notas</label>
                    <textarea id="tarea-notas" class="form-control" placeholder="Notas..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal('modal-tarea')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarTarea()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Confirmación -->
    <div class="modal-overlay" id="modal-confirm" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal confirm-dialog">
            <div class="modal-body">
                <p id="confirm-mensaje">¿Estás seguro?</p>
                <div class="confirm-actions">
                    <button class="btn btn-secondary" onclick="cerrarModal('modal-confirm')">Cancelar</button>
                    <button class="btn btn-danger" id="confirm-btn" onclick="">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL: Lista de Plantillas -->
    <div class="modal-overlay" id="modal-plantillas" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal modal-detail">
            <div class="modal-header">
                <h2>Gestionar Plantillas</h2>
                <button class="modal-close" onclick="cerrarModal('modal-plantillas')">&times;</button>
            </div>
            <div class="modal-body">
                <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
                    <button class="btn btn-primary btn-sm" onclick="abrirEditorPlantilla()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Nueva Plantilla
                    </button>
                </div>
                <div id="plantillas-lista"></div>
            </div>
        </div>
    </div>

    <!-- MODAL: Editar Plantilla -->
    <div class="modal-overlay" id="modal-editar-plantilla" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal modal-detail">
            <div class="modal-header">
                <h2 id="editor-plantilla-titulo">Nueva Plantilla</h2>
                <button class="modal-close" onclick="cerrarModal('modal-editar-plantilla')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="plantilla-id">
                <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label>Nombre</label>
                        <input type="text" id="plantilla-nombre" class="form-control" placeholder="Nombre de la plantilla">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label>Descripcion</label>
                        <input type="text" id="plantilla-descripcion" class="form-control" placeholder="Breve descripcion">
                    </div>
                </div>
                <div class="plantilla-secciones" id="plantilla-secciones"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal('modal-editar-plantilla')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarPlantilla()">Guardar Plantilla</button>
            </div>
        </div>
    </div>

    <!-- MODAL: Subtarea -->
    <div class="modal-overlay" id="modal-subtarea" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-subtarea-titulo">Nueva Subtarea</h2>
                <button class="modal-close" onclick="cerrarModal('modal-subtarea')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="subtarea-proyecto-id">
                <input type="hidden" id="subtarea-seccion-nombre">
                <input type="hidden" id="subtarea-tarea-id">
                <input type="hidden" id="subtarea-id">
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="subtarea-nombre" class="form-control" placeholder="Nombre de la subtarea">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha de reunion</label>
                        <input type="text" id="subtarea-fecha" class="form-control" placeholder="Seleccionar fecha" readonly>
                    </div>
                    <div class="form-group">
                        <label>Tiempo estimado (min)</label>
                        <input type="number" id="subtarea-tiempo" class="form-control" placeholder="60" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Completada</label>
                        <select id="subtarea-completada" class="form-control">
                            <option value="false">No</option>
                            <option value="true">Si</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Notas</label>
                    <textarea id="subtarea-notas" class="form-control" placeholder="Notas..."></textarea>
                </div>
                <div class="form-group">
                    <label>Participantes</label>
                    <div id="subtarea-participantes" class="participantes-checkboxes"></div>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="subtarea-agendar"> Agendar en Google Calendar
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal('modal-subtarea')">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarSubtarea()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="js-gestor/data.js?v=2"></script>
    <script src="js-gestor/app.js?v=2"></script>
</body>
</html>
