<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Sin Asignar - Yurest</title>
    <script src="config.js"></script>
    <script>YurestConfig.requireAuth('sinasignar');</script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Sidebar (shared) ── */
        .sidebar-overlay { position:fixed;inset:0;background:rgba(15,23,42,0.45);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.25s }
        .sidebar-overlay.open { opacity:1;pointer-events:all }
        .sidebar { position:fixed;top:0;left:0;width:248px;height:100vh;background:#fff;z-index:600;transform:translateX(-100%);transition:transform 0.26s cubic-bezier(0.4,0,0.2,1);box-shadow:4px 0 24px rgba(0,0,0,0.13);display:flex;flex-direction:column }
        .sidebar.open { transform:translateX(0) }
        .sidebar-hd { display:flex;align-items:center;justify-content:space-between;padding:20px 18px 16px;border-bottom:1.5px solid #f1f5f9 }
        .sidebar-brand { display:flex;align-items:center;gap:8px;font-size:0.78rem;font-weight:800;letter-spacing:0.13em;text-transform:uppercase;color:#fc5858 }
        .sidebar-brand-dot { width:8px;height:8px;background:#fc5858;border-radius:50%;box-shadow:0 0 0 3px rgba(252,88,88,0.25) }
        .sidebar-close { width:28px;height:28px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s }
        .sidebar-close:hover { background:#fee2e2;border-color:#fecaca;color:#dc2626 }
        .sidebar-label { padding:16px 18px 6px;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#94a3b8 }
        .sidebar-item { display:flex;align-items:center;gap:12px;padding:11px 18px;margin:2px 10px;border-radius:10px;font-size:0.88rem;font-weight:500;color:#334155;text-decoration:none;cursor:pointer;transition:background 0.14s }
        .sidebar-item:hover { background:#f8fafc;color:#1e293b }
        .sidebar-item.active { background:#fff1f1;color:#fc5858;font-weight:700 }
        .sidebar-item svg { flex-shrink:0;opacity:0.7 }
        .sidebar-item.active svg { opacity:1 }
        .sidebar-group { margin: 2px 0; }
        .sidebar-group-header { display:flex;align-items:center;gap:12px;padding:11px 18px;margin:2px 10px;border-radius:10px;font-size:0.88rem;font-weight:500;color:#334155;cursor:pointer;user-select:none;transition:background 0.14s,color 0.14s }
        .sidebar-group-header:hover { background:#f8fafc;color:#1e293b }
        .sidebar-group-header svg { flex-shrink:0;opacity:0.7 }
        .sidebar-group-chevron { margin-left:auto;transition:transform 0.18s }
        .sidebar-group.open .sidebar-group-chevron { transform:rotate(90deg) }
        .sidebar-group-children { max-height:0;overflow:hidden;transition:max-height 0.2s ease }
        .sidebar-group.open .sidebar-group-children { max-height:500px }
        .sidebar-group-children .sidebar-item { padding-left:44px;font-size:0.84rem;position:relative }
        .sidebar-group-children .sidebar-item::before { content:'';position:absolute;left:30px;top:50%;width:8px;height:1.5px;background:#cbd5e1 }
        .sidebar-badge { display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 8px;font-size:11px;font-weight:800;color:#fff;background:linear-gradient(135deg,#fb923c,#f59e0b);border-radius:999px;margin-left:auto;box-shadow:0 1px 3px rgba(245,158,11,0.35);letter-spacing:0.02em }
        .sidebar-group-badge { display:none; min-width:20px; height:20px; padding:0 7px; font-size:10px; font-weight:800; color:#fff; background:linear-gradient(135deg,#fb923c,#f59e0b); border-radius:999px; box-shadow:0 1px 3px rgba(245,158,11,.35); align-items:center; justify-content:center; margin-left:auto; letter-spacing:.02em; } .sidebar-group:not(.open) .sidebar-group-badge:not(:empty) { display:inline-flex; } .sidebar-group:not(.open) .sidebar-group-badge:not(:empty) ~ .sidebar-group-chevron { margin-left:6px; }
        .sidebar-badge:empty { display:none }
        .sidebar-ft { margin-top:auto;padding:16px 18px;border-top:1.5px solid #f1f5f9 }
        .sidebar-ft button { display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:0.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.15s }
        .sidebar-ft button:hover { background:#fee2e2 }

        .btn-menu { display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;color:#64748b;transition:border-color 0.15s }
        .btn-menu:hover { border-color:#fc5858;color:#fc5858;background:#fff1f1 }

        /* ── Page layout ── */
        .page-header {
            display:flex;align-items:center;gap:14px;
            padding:20px 24px;border-bottom:1px solid #e2e8f0;background:#fff;
            position:sticky;top:0;z-index:50;
        }
        .page-header img { height:32px }
        .page-header h1 { font-size:1.1rem;font-weight:800;color:#1e293b }
        .page-content { max-width:1200px;margin:0 auto;padding:20px 24px }
        .page-toolbar {
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:16px;flex-wrap:wrap;gap:12px;
        }
        .page-toolbar h3 { font-size:15px;font-weight:700;color:#1e293b }
        .page-stats { font-size:13px;color:#64748b }

        /* Barra de filtros */
        .filter-bar {
            display:flex;align-items:center;gap:10px;flex-wrap:wrap;
            padding:14px 0; margin-bottom:4px;
        }
        .filter-label {
            font-size:0.72rem;font-weight:700;letter-spacing:0.08em;
            text-transform:uppercase;color:#94a3b8;margin-right:4px;
        }
        .chip-filter {
            display:inline-flex;align-items:center;gap:6px;
            padding:6px 14px;border-radius:999px;
            font-size:0.82rem;font-weight:600;color:#475569;
            background:#fff;border:1.5px solid #e2e8f0;
            cursor:pointer;user-select:none;
            transition:all 0.15s;
        }
        .chip-filter:hover { background:#f8fafc;border-color:#cbd5e1 }
        .chip-filter.active {
            background:#fff1f1;border-color:#fc5858;color:#fc5858;
        }
        .chip-filter .chip-count {
            font-size:0.7rem;font-weight:700;
            background:#f1f5f9;color:#64748b;
            padding:1px 7px;border-radius:999px;
        }
        .chip-filter.active .chip-count {
            background:#fc5858;color:#fff;
        }
        .chip-filter.chip-all { background:#0f172a;border-color:#0f172a;color:#fff }
        .chip-filter.chip-all.active { background:#fc5858;border-color:#fc5858;color:#fff }
        .chip-filter.chip-all .chip-count { background:rgba(255,255,255,0.2);color:#fff }

        /* ── Cards grid ── */
        .cards-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
            gap:14px;
        }

        /* ── Ficha card ── */
        .ficha-card {
            background:#fff;border:1px solid #e2e8f0;border-radius:12px;
            padding:16px;cursor:pointer;transition:all 0.15s;border-left:4px solid #D97706;
        }
        .ficha-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-1px) }
        .ficha-card-header { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px }
        .ficha-card-name { font-size:14px;font-weight:700;color:#1e293b }
        .ficha-card-comercial { font-size:12px;color:#64748b;margin-bottom:6px }
        .ficha-badge { font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:#FEF3C7;color:#D97706;white-space:nowrap }
        .ficha-card-meta { display:flex;align-items:center;gap:10px;font-size:12px;color:#64748b;flex-wrap:wrap }
        .ficha-tipo { font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:#f1f5f9;color:#475569 }
        .ficha-fecha { display:flex;align-items:center;gap:4px }

        /* ── Modal ── */
        .modal-overlay { position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.2s }
        .modal-overlay.active { opacity:1;visibility:visible }
        .modal { background:#fff;border-radius:16px;width:95%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,0.15) }
        .modal-header { display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e2e8f0 }
        .modal-header h2 { font-size:16px;font-weight:700 }
        .modal-close { background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;padding:4px }
        .modal-close:hover { color:#1e293b }
        .modal-body { padding:20px }
        .modal-footer { display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid #e2e8f0 }
        .form-group { margin-bottom:14px }
        .form-group label { display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px }
        .form-control { width:100%;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;transition:border-color 0.15s;box-sizing:border-box }
        .form-control[readonly] { background:#f8fafc;color:#64748b;cursor:not-allowed;border-color:#e2e8f0 }
        .form-control[readonly]:focus { outline:none;border-color:#e2e8f0;box-shadow:none }
        .form-control:focus { outline:none;border-color:#4F46E5 }
        .form-row { display:flex;gap:12px }
        .form-row .form-group { flex:1 }

        /* Pills de módulos contratados en el modal de asignar */
        .modulos-pills { display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;min-height:40px;align-items:center }
        .modulos-pill { font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;white-space:nowrap }
        .modulos-empty { font-size:12px;color:#94a3b8;font-style:italic }
        .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s }
        .btn-primary { background:#4F46E5;color:#fff }
        .btn-primary:hover { background:#4338CA }
        .btn-secondary { background:#f1f5f9;color:#475569;border:1px solid #e2e8f0 }
        .btn-secondary:hover { background:#e2e8f0 }
        .btn-sm { padding:6px 12px;font-size:12px }

        /* ── Empty state ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align:center;
            padding:80px 20px;color:#94a3b8;
            display:flex;flex-direction:column;align-items:center;justify-content:center;
        }
        .empty-state svg { width:48px;height:48px;margin-bottom:12px }
        .empty-state h3 { font-size:16px;color:#475569;margin-bottom:4px }
        .empty-state p { font-size:13px }

        /* ── Spinner ── */
        .spinner { width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#4F46E5;border-radius:50%;animation:spin 0.7s linear infinite }
        @keyframes spin { to { transform:rotate(360deg) } }
        .loading-center { display:flex;flex-direction:column;align-items:center;padding:48px;gap:12px;color:#64748b }

        /* ── Toast ── */
        #toast-container { position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none }
        .toast { display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:10px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.12);font-size:13px;font-weight:500;color:#1e293b;pointer-events:auto;transform:translateX(120%);opacity:0;transition:transform 0.3s cubic-bezier(.4,0,.2,1),opacity 0.3s;max-width:380px;border-left:4px solid #94a3b8 }
        .toast.show { transform:translateX(0);opacity:1 }
        .toast-icon { flex-shrink:0;display:flex;align-items:center }
        .toast-success { border-left-color:#10b981 } .toast-success .toast-icon { color:#10b981 }
        .toast-error { border-left-color:#ef4444 } .toast-error .toast-icon { color:#ef4444 }
        .toast-warning { border-left-color:#f59e0b } .toast-warning .toast-icon { color:#f59e0b }

        /* ── Loading overlay ── */
        #loading-overlay { position:fixed;inset:0;background:rgba(255,255,255,0.6);backdrop-filter:blur(2px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 0.2s }
        #loading-overlay.active { opacity:1;visibility:visible }
        .loading-spinner { width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#4F46E5;border-radius:50%;animation:spin 0.7s linear infinite }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="sidebar.js"></script>
    <script>YurestSidebar.render('sinasignar');</script>

    <!-- HEADER -->
    <div class="page-header">
        <button class="btn-menu" onclick="openSidebar()" title="Menú" aria-label="Abrir menú lateral">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <img src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest">
        <h1>Proyectos sin asignar</h1>
    </div>

    <!-- CONTENT -->
    <div class="page-content">
        <div class="page-toolbar">
            <div>
                <h3>Fichas de alta sin proyecto</h3>
                <div class="page-stats" id="fichas-stats"></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="cargarFichas()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                Recargar
            </button>
        </div>
        <div class="filter-bar" id="filter-bar">
            <span class="filter-label">Tipo</span>
            <button class="chip-filter chip-all active" data-tipo="__all__" onclick="toggleFiltroTipo(this)">
                Todos <span class="chip-count" id="count-tipo-all">0</span>
            </button>
            <button class="chip-filter" data-tipo="lite" onclick="toggleFiltroTipo(this)">
                Lite <span class="chip-count" id="count-tipo-lite">0</span>
            </button>
            <button class="chip-filter" data-tipo="planes" onclick="toggleFiltroTipo(this)">
                Planes <span class="chip-count" id="count-tipo-planes">0</span>
            </button>
            <button class="chip-filter" data-tipo="corporate" onclick="toggleFiltroTipo(this)">
                Corporate <span class="chip-count" id="count-tipo-corp">0</span>
            </button>
            <button class="chip-filter" data-tipo="corporate_cp" onclick="toggleFiltroTipo(this)">
                Corporate + CP <span class="chip-count" id="count-tipo-corp-cp">0</span>
            </button>
            <button class="chip-filter" data-tipo="corp_cocina" onclick="toggleFiltroTipo(this)">
                CORP. Cocina Producción <span class="chip-count" id="count-tipo-corp-cocina">0</span>
            </button>
        </div>
        <div class="cards-grid" id="fichas-grid"></div>
    </div>

    <!-- MODAL: Asignar Proyecto -->
    <div class="modal-overlay" id="modal-asignar" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal">
            <div class="modal-header">
                <h2>Asignar Proyecto</h2>
                <button class="modal-close" onclick="cerrarModal('modal-asignar')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="asignar-ficha-idx">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre Comercial</label>
                        <input type="text" id="asignar-comercial" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label>Denominación Social</label>
                        <input type="text" id="asignar-cliente" class="form-control" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo</label>
                        <input type="text" id="asignar-tipo" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label>Locales</label>
                        <input type="text" id="asignar-locales" class="form-control" readonly>
                    </div>
                </div>
                <div class="form-group">
                    <label>Módulos contratados</label>
                    <div id="asignar-modulos" class="modulos-pills" aria-live="polite">
                        <span class="modulos-empty">Sin módulos</span>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fecha alta</label>
                        <input type="text" id="asignar-fecha" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label>Implementador</label>
                        <select id="asignar-implementador" class="form-control"></select>
                    </div>
                </div>

                <!-- Promoción (solo para clientes tipo "Planes").
                     Si la ficha es Planes, el implementador elige una promo
                     con hueco libre + su turno (mañana/tarde). Se persiste
                     en proyectos.promocion_id + proyectos.promocion_turno.
                     Las promociones con 0 plazas totales libres no se muestran. -->
                <div class="form-group" id="asignar-promo-wrap" style="display:none">
                    <label>Promoción (tipo Planes)</label>
                    <select id="asignar-promocion" class="form-control" onchange="onPromocionChange()">
                        <option value="">— Selecciona una promoción con plazas libres —</option>
                    </select>
                    <small class="form-hint">Solo se listan promociones activas con al menos 1 plaza libre.</small>
                </div>
                <div class="form-row" id="asignar-turno-wrap" style="display:none">
                    <div class="form-group">
                        <label>Turno</label>
                        <div class="pct-group" id="asignar-turno-group">
                            <input type="radio" id="turno_manana" name="promo_turno" value="manana" onchange="onTurnoChange()">
                            <label for="turno_manana" class="pct-btn">🌅 Mañana <span id="turno_manana_libres" style="opacity:.7;font-size:.72rem"></span></label>
                            <input type="radio" id="turno_tarde"  name="promo_turno" value="tarde"  onchange="onTurnoChange()">
                            <label for="turno_tarde"  class="pct-btn">🌇 Tarde <span id="turno_tarde_libres" style="opacity:.7;font-size:.72rem"></span></label>
                        </div>
                    </div>
                </div>

                <!-- Jefe de proyecto (cliente): info meramente informativa
                     — no editable aquí. Al crear el proyecto, su email se
                     añade automáticamente a participantes. Si no había JP
                     capturado en la ficha, mostramos un aviso discreto. -->
                <div class="form-group" id="asignar-jp-wrap" style="display:none">
                    <label>Jefe de proyecto (cliente)</label>
                    <div id="asignar-jp-info" style="padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;font-size:0.85rem;color:#334155"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal('modal-asignar')">Cancelar</button>
                <button class="btn btn-primary" onclick="crearProyectoDesdeAlta()">Crear Proyecto</button>
            </div>
        </div>
    </div>

    <script src="js-gestor/data.js"></script>
    <script>
    // ==========================================
    // Sin Asignar - Standalone Page
    // ==========================================

    let fichasSinAsignar = [];   // TODAS las fichas sin asignar (sin filtrar)
    let fichasFiltradas = [];    // Las que se muestran tras aplicar filtros
    let filtrosTipo = new Set(); // Set de tipos activos (vacío = todos)
    let proyectos = [];

    document.addEventListener('DOMContentLoaded', async () => {
        showLoading();
        try {
            proyectos = await cargarProyectos();
        } catch (_) { proyectos = []; }
        hideLoading();
        cargarFichas();

        // Close modals on overlay click / ESC
        document.querySelectorAll('.modal-overlay').forEach(ov => {
            ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('active'); });
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
        });
    });

    async function cargarFichas() {
        const grid = document.getElementById('fichas-grid');
        grid.innerHTML = '<div class="loading-center"><div class="spinner"></div><p>Cargando fichas de alta...</p></div>';

        try {
            const res = await fetch(WEBHOOK_ALTAS, { method: 'GET', headers: getAuthHeaders() });
            if (!res.ok) throw new Error('Error ' + res.status);
            let data = {};
            try { data = await res.json(); } catch (_) {}
            const raw = Array.isArray(data) ? data
                : Array.isArray(data.clientes) ? data.clientes
                : Array.isArray(data.data) ? data.data : [];

            const todas = raw.map(normalizarAlta).filter(a => a.nombre);
            const nombresExistentes = new Set(proyectos.map(p => normalizarNombreCliente(p.cliente)));
            fichasSinAsignar = todas.filter(a => !nombresExistentes.has(normalizarNombreCliente(a.nombre)));

            const badge = document.getElementById('badge-sinasignar');
            if (badge) badge.textContent = fichasSinAsignar.length > 0 ? fichasSinAsignar.length : '';

            actualizarContadoresFiltros();
            aplicarFiltros();
        } catch (err) {
            grid.innerHTML = `<div class="empty-state">
                <p style="color:#ef4444">No se pudieron cargar las fichas</p>
                <p style="font-size:12px;margin-top:4px">${escapeHtml(err.message)}</p>
                <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="cargarFichas()">Reintentar</button>
            </div>`;
        }
    }

    // Devuelve el slug canónico del tipo de una ficha para comparar con los
    // chips del filtro. Los valores válidos en BD son:
    //   lite | planes | corporate | corporate_cp | corp_cocina
    // Para fichas legacy con texto libre ("corporate con cocina", etc.)
    // aplicamos heurísticas que mapean al slug nuevo equivalente.
    function tipoDeFicha(f) {
        const raw = (f.tipo || f.tipoOriginal || '').toString().toLowerCase().trim();
        // 1) Match directo contra los slugs oficiales
        if (['lite','planes','corporate','corporate_cp','corp_cocina'].includes(raw)) return raw;
        // 2) Heurísticas legacy
        if (raw.includes('lite')) return 'lite';
        if (raw.includes('planes')) return 'planes';
        if (raw.includes('cocina') || raw.includes('producción') || raw.includes('produccion')) return 'corp_cocina';
        if (raw.includes('cp') || raw.includes('compra')) return 'corporate_cp';
        if (raw.includes('corporate') || raw.includes('corp')) return 'corporate';
        return raw;
    }

    function actualizarContadoresFiltros() {
        const total = fichasSinAsignar.length;
        const countByTipo = { lite:0, planes:0, corporate:0, corporate_cp:0, corp_cocina:0 };
        fichasSinAsignar.forEach(f => {
            const t = tipoDeFicha(f);
            if (countByTipo[t] != null) countByTipo[t]++;
        });
        document.getElementById('count-tipo-all').textContent        = total;
        document.getElementById('count-tipo-lite').textContent       = countByTipo.lite;
        document.getElementById('count-tipo-planes').textContent     = countByTipo.planes;
        document.getElementById('count-tipo-corp').textContent       = countByTipo.corporate;
        document.getElementById('count-tipo-corp-cp').textContent    = countByTipo.corporate_cp;
        document.getElementById('count-tipo-corp-cocina').textContent = countByTipo.corp_cocina;
    }

    function toggleFiltroTipo(btn) {
        const tipo = btn.dataset.tipo;
        if (tipo === '__all__') {
            // Limpiar todos los filtros
            filtrosTipo.clear();
            document.querySelectorAll('.chip-filter').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
        } else {
            if (filtrosTipo.has(tipo)) filtrosTipo.delete(tipo);
            else filtrosTipo.add(tipo);
            btn.classList.toggle('active');
            // Si no queda ninguno activo, marcar "Todos"
            const allBtn = document.querySelector('.chip-filter.chip-all');
            if (filtrosTipo.size === 0) allBtn.classList.add('active');
            else allBtn.classList.remove('active');
        }
        aplicarFiltros();
    }

    function aplicarFiltros() {
        if (filtrosTipo.size === 0) {
            fichasFiltradas = [...fichasSinAsignar];
        } else {
            fichasFiltradas = fichasSinAsignar.filter(f => filtrosTipo.has(tipoDeFicha(f)));
        }
        document.getElementById('fichas-stats').textContent =
            `${fichasFiltradas.length} fichas sin proyecto` +
            (filtrosTipo.size > 0 ? ` (filtradas de ${fichasSinAsignar.length})` : '');
        renderFichas();
    }

    function renderFichas() {
        const grid = document.getElementById('fichas-grid');
        if (fichasFiltradas.length === 0) {
            if (fichasSinAsignar.length === 0) {
                grid.innerHTML = `<div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <h3>Todo asignado</h3>
                    <p>Todas las fichas de alta ya tienen proyecto creado</p>
                </div>`;
            } else {
                grid.innerHTML = `<div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <h3>Sin resultados</h3>
                    <p>Ninguna ficha coincide con los filtros seleccionados</p>
                </div>`;
            }
            return;
        }

        grid.innerHTML = fichasFiltradas.map((f, i) => {
            const idxOriginal = fichasSinAsignar.indexOf(f);
            return `
            <div class="ficha-card" onclick="abrirModalAsignar(${idxOriginal})">
                <div class="ficha-card-header">
                    <span class="ficha-card-name">${escapeHtml(f.nombreComercial || f.nombre)}</span>
                    <span class="ficha-badge">Sin asignar</span>
                </div>
                ${f.nombreComercial && f.nombre && f.nombreComercial !== f.nombre ? `<div class="ficha-card-comercial">${escapeHtml(f.nombre)}</div>` : ''}
                <div class="ficha-card-meta">
                    <span class="ficha-tipo">${escapeHtml(f.tipo || f.tipoOriginal)}</span>
                    ${f.fecha ? `<span class="ficha-fecha">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        ${escapeHtml(formatearFechaAmigable(f.fecha))}
                    </span>` : ''}
                    ${f.implementador ? `<span>${escapeHtml(f.implementador)}</span>` : ''}
                </div>
            </div>
            `;
        }).join('');
    }

    function abrirModalAsignar(idx) {
        const f = fichasSinAsignar[idx];
        if (!f) return;
        document.getElementById('asignar-ficha-idx').value = idx;
        document.getElementById('asignar-comercial').value = f.nombreComercial || '—';
        document.getElementById('asignar-cliente').value = f.nombre || '—';
        document.getElementById('asignar-tipo').value = f.tipoOriginal || f.tipo;
        document.getElementById('asignar-fecha').value = formatearFechaAmigable(f.fecha);

        // Locales contratados
        const nLoc = Number(f.localesCount) || 0;
        document.getElementById('asignar-locales').value = nLoc === 0
            ? '—'
            : (nLoc + (nLoc === 1 ? ' local' : ' locales'));

        // Pills de módulos contratados
        const modCont = document.getElementById('asignar-modulos');
        const mods = Array.isArray(f.modulos) ? f.modulos.filter(Boolean) : [];
        if (mods.length === 0) {
            modCont.innerHTML = '<span class="modulos-empty">Sin módulos</span>';
        } else {
            modCont.innerHTML = mods
                .map(m => `<span class="modulos-pill">${escapeHtml(m)}</span>`)
                .join('');
        }

        const selImpl = document.getElementById('asignar-implementador');
        selImpl.innerHTML = '<option value="">— Selecciona un implementador —</option>' +
            IMPLEMENTADORES.map(impl => `<option value="${impl}">${impl}</option>`).join('');
        selImpl.value = '';

        // ── Promoción (solo para fichas tipo Planes) ────────────────────
        // Detección tolerante: tipoOriginal viene de BD como slug (puede ser
        // "planes") o como texto libre legacy ("Planes", "PLANES"). Normaliza.
        const tipoSlug = String(f.tipoOriginal || f.tipo || '').toLowerCase().trim();
        const esPlanes = tipoSlug === 'planes' || tipoSlug.includes('planes');
        const promoWrap = document.getElementById('asignar-promo-wrap');
        const turnoWrap = document.getElementById('asignar-turno-wrap');
        if (esPlanes) {
            promoWrap.style.display = '';
            _cargarPromocionesParaSelector();
        } else {
            promoWrap.style.display = 'none';
            turnoWrap.style.display = 'none';
            // Limpieza por si el usuario abrió antes una de tipo Planes
            document.getElementById('asignar-promocion').innerHTML = '<option value="">—</option>';
            document.querySelectorAll('input[name="promo_turno"]').forEach(r => r.checked = false);
        }

        // Jefe de Proyecto: info + aviso de auto-add a participantes del
        // proyecto que se va a crear. Si la ficha no capturó JP (ficha
        // antigua incompleta), ocultamos el bloque en vez de mostrar vacío.
        const jpWrap = document.getElementById('asignar-jp-wrap');
        const jpInfo = document.getElementById('asignar-jp-info');
        const jpDisplay = f.jpDisplay || '';
        const jpMail    = f.jpMail || '';
        if (jpMail || jpDisplay) {
            const nombreHtml = jpDisplay
                ? `<strong>${escapeHtml(jpDisplay)}</strong>${f.jpRol ? ` <span style="color:#64748b">· ${escapeHtml(f.jpRol)}</span>` : ''}`
                : '<em style="color:#64748b">Sin nombre registrado</em>';
            const mailHtml = jpMail
                ? `<div style="margin-top:2px;font-family:monospace;font-size:0.8rem;color:#475569">${escapeHtml(jpMail)}</div>`
                : '';
            const aviso = jpMail
                ? `<div style="margin-top:6px;font-size:0.75rem;color:#0891b2">Se añadirá automáticamente como participante del proyecto</div>`
                : `<div style="margin-top:6px;font-size:0.75rem;color:#d97706">⚠️ Sin email: no se puede añadir como participante automáticamente</div>`;
            jpInfo.innerHTML = nombreHtml + mailHtml + aviso;
            jpWrap.style.display = '';
        } else {
            jpWrap.style.display = 'none';
        }

        abrirModal('modal-asignar');
    }

    // ── Promociones (Planes) ─────────────────────────────────────────────
    // Cache en memoria para no re-consultar el endpoint cada vez que se
    // abre el modal: se invalida al crear un proyecto (nueva ocupación).
    let _promoCache = null;

    async function _cargarPromocionesParaSelector() {
        const sel = document.getElementById('asignar-promocion');
        sel.innerHTML = '<option value="">Cargando…</option>';
        sel.disabled = true;
        try {
            if (!_promoCache) {
                const ep = YurestConfig.ENDPOINTS.promociones;
                const res = await YurestConfig.apiFetch(ep, { method: 'GET' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                _promoCache = Array.isArray(data) ? data
                            : Array.isArray(data.promociones) ? data.promociones
                            : [];
            }
            // Filtramos: solo activas con al menos 1 plaza libre total.
            const disponibles = _promoCache.filter(p => p.estado !== 'cerrada' && (Number(p.libres_total) || 0) > 0);
            sel.innerHTML = '<option value="">— Selecciona una promoción con plazas libres —</option>'
                + disponibles.map(p => {
                    const libres = Number(p.libres_total) || 0;
                    const total = (Number(p.plazas_manana) || 0) + (Number(p.plazas_tarde) || 0);
                    const fecha = p.fecha_inicio ? new Date(p.fecha_inicio).toLocaleDateString('es-ES', {day:'2-digit', month:'short', year:'numeric'}) : '';
                    return `<option value="${escapeHtml(p.id)}">${escapeHtml(p.nombre)} · ${libres}/${total} libres${fecha ? ' · ' + fecha : ''}</option>`;
                }).join('');
            if (disponibles.length === 0) {
                sel.innerHTML = '<option value="">— No hay promociones con plazas libres —</option>';
            }
        } catch (err) {
            console.warn('[promociones] cargar', err);
            sel.innerHTML = '<option value="">Error al cargar promociones</option>';
        } finally {
            sel.disabled = false;
        }
        document.getElementById('asignar-turno-wrap').style.display = 'none';
        document.querySelectorAll('input[name="promo_turno"]').forEach(r => r.checked = false);
    }

    function onPromocionChange() {
        const promoId = document.getElementById('asignar-promocion').value;
        const wrap = document.getElementById('asignar-turno-wrap');
        if (!promoId) { wrap.style.display = 'none'; return; }
        const p = (_promoCache || []).find(x => x.id === promoId);
        if (!p) { wrap.style.display = 'none'; return; }
        const libM = Number(p.libres_manana) || 0;
        const libT = Number(p.libres_tarde)  || 0;
        // Muestra el contador + deshabilita el turno sin plazas.
        const rM = document.getElementById('turno_manana');
        const rT = document.getElementById('turno_tarde');
        rM.disabled = libM <= 0;
        rT.disabled = libT <= 0;
        document.getElementById('turno_manana_libres').textContent = ' (' + libM + ' libre' + (libM === 1 ? '' : 's') + ')';
        document.getElementById('turno_tarde_libres').textContent  = ' (' + libT + ' libre' + (libT === 1 ? '' : 's') + ')';
        // Auto-seleccionar el único turno disponible si solo hay uno.
        if (libM > 0 && libT <= 0) { rM.checked = true; }
        else if (libT > 0 && libM <= 0) { rT.checked = true; }
        else { rM.checked = false; rT.checked = false; }
        wrap.style.display = '';
    }
    window.onPromocionChange = onPromocionChange;

    function onTurnoChange() { /* hook reservado; nada que hacer ahora mismo */ }
    window.onTurnoChange = onTurnoChange;

    async function crearProyectoDesdeAlta() {
        const idx = parseInt(document.getElementById('asignar-ficha-idx').value);
        const f = fichasSinAsignar[idx];
        if (!f) return;

        const implementador = document.getElementById('asignar-implementador').value;

        if (!implementador) {
            mostrarToast('Selecciona un implementador', 'error');
            return;
        }

        // Validación Planes: si la sección promo está visible, exigimos
        // promoción + turno con plazas libres.
        let promocionId = null;
        let promocionTurno = null;
        if (document.getElementById('asignar-promo-wrap').style.display !== 'none') {
            promocionId = document.getElementById('asignar-promocion').value || null;
            const turnoRadio = document.querySelector('input[name="promo_turno"]:checked');
            promocionTurno = turnoRadio ? turnoRadio.value : null;
            if (!promocionId) {
                mostrarToast('Selecciona una promoción para este cliente Planes', 'error');
                return;
            }
            if (!promocionTurno) {
                mostrarToast('Selecciona un turno (mañana o tarde) dentro de la promoción', 'error');
                return;
            }
            // Doble-chequeo: la promo que el usuario eligió sigue teniendo plaza libre
            // en el turno elegido (por si otro implementador creó un proyecto
            // desde que se cargó el selector).
            const p = (_promoCache || []).find(x => x.id === promocionId);
            const libres = p ? (promocionTurno === 'manana' ? p.libres_manana : p.libres_tarde) : 0;
            if ((libres || 0) <= 0) {
                mostrarToast('La promoción y turno elegidos ya no tienen plazas libres. Recarga e intenta de nuevo.', 'error');
                _promoCache = null;  // fuerza recarga al reabrir
                return;
            }
        }

        showLoading();
        try {
            // El JP del cliente entra como primer participante del proyecto
            // si tiene email registrado en la ficha. Así recibe invites de
            // calendario y aparece en la ficha del proyecto sin que el
            // implementador tenga que teclearlo. Si la ficha no capturó JP
            // (ficha antigua) el array queda vacío y el implementador puede
            // añadir participantes manualmente más tarde.
            const participantesIniciales = [];
            if (f.jpMail) {
                participantesIniciales.push(f.jpMail);
            }

            const nuevoProyecto = {
                id: generarId(),
                cliente: f.nombre,
                implementador,
                tipo: f.tipo,
                estado: 'activo',
                fechaInicio: f.fecha ? formatearFechaISO(f.fecha) : new Date().toISOString().split('T')[0],
                ultimaActividad: new Date().toISOString().split('T')[0],
                secciones: crearEstructuraProyecto(f.modulos),
                anotaciones: [],
                asanaProjectId: '',
                tpv: f.tpv || '',
                participantes: participantesIniciales,
                // Promoción + turno (solo no-null para fichas tipo Planes).
                promocionId:    promocionId,
                promocionTurno: promocionTurno,
                promocion_id:    promocionId,
                promocion_turno: promocionTurno
            };

            await crearProyectoAPI(nuevoProyecto).catch(() => {});
            _promoCache = null;  // invalidar para que el próximo modal muestre ocupación actualizada
            proyectos.push(nuevoProyecto);
            guardarProyectosLocal(proyectos);

            // Audit log: registrar que se creó un proyecto desde esta ficha.
            YurestConfig.logHistorial({
                ficha_id: f.altaId || null,
                accion: 'proyecto_creado',
                descripcion: `Proyecto asignado a ${implementador}`,
                metadata: {
                    implementador,
                    tipo: f.tipo,
                    modulos_contratados: Array.isArray(f.modulos) ? f.modulos.length : 0,
                    locales: f.localesCount || 0
                }
            });

            fichasSinAsignar.splice(idx, 1);
            actualizarContadoresFiltros();
            aplicarFiltros();
            cerrarModal('modal-asignar');
            mostrarToast(`Proyecto creado para ${f.nombre}`, 'success');

            // Recargar fichas desde backend para asegurar estado consistente
            setTimeout(() => cargarFichas(), 300);
        } catch (err) {
            mostrarToast('Error: ' + err.message, 'error');
        } finally {
            hideLoading();
        }
    }

    function formatearFechaISO(fechaStr) {
        if (!fechaStr) return new Date().toISOString().split('T')[0];
        const d = new Date(fechaStr);
        if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
        const parts = fechaStr.split('/');
        if (parts.length === 3) {
            const [day, month, year] = parts;
            return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
        }
        return new Date().toISOString().split('T')[0];
    }

    // Fecha amigable: "15/04/2026"
    function formatearFechaAmigable(fechaStr) {
        if (!fechaStr) return '—';
        const d = new Date(fechaStr);
        if (isNaN(d.getTime())) return String(fechaStr);
        return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    // ── Helpers ──
    function escapeHtml(t) { const d=document.createElement('div');d.textContent=t;return d.innerHTML }
    function abrirModal(id) {
        document.getElementById(id).classList.add('active');
        YurestConfig.a11yAbrirModal(id);
    }
    function cerrarModal(id) {
        document.getElementById(id).classList.remove('active');
        YurestConfig.a11yCerrarModal(id);
    }
    function openSidebar() { document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open') }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open') }

    function mostrarToast(msg, tipo) {
        let c = document.getElementById('toast-container');
        if (!c) { c=document.createElement('div');c.id='toast-container';document.body.appendChild(c) }
        const t=document.createElement('div');
        t.className='toast toast-'+tipo;
        t.innerHTML='<span class="toast-icon">'+({success:'&#10003;',error:'&#10007;',warning:'&#9888;'}[tipo]||'&#8505;')+'</span><span>'+escapeHtml(msg)+'</span>';
        c.appendChild(t);
        requestAnimationFrame(()=>t.classList.add('show'));
        setTimeout(()=>{t.classList.remove('show');t.addEventListener('transitionend',()=>t.remove())},4000);
    }

    function showLoading() {
        let o=document.getElementById('loading-overlay');
        if(!o){o=document.createElement('div');o.id='loading-overlay';o.innerHTML='<div class="loading-spinner"></div>';document.body.appendChild(o)}
        o.classList.add('active');
    }
    function hideLoading() { const o=document.getElementById('loading-overlay');if(o)o.classList.remove('active') }
    </script>
</body>
