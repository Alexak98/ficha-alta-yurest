<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Asignar - Yurest</title>
    <script>if (!sessionStorage.getItem('yurest_auth')) window.location.replace('login.html');</script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Sidebar (shared) ── */
        .sidebar-overlay { position:fixed;inset:0;background:rgba(15,23,42,0.45);z-index:500;opacity:0;pointer-events:none;transition:opacity 0.25s }
        .sidebar-overlay.open { opacity:1;pointer-events:all }
        .sidebar { position:fixed;top:0;left:0;width:248px;height:100vh;background:#fff;z-index:600;transform:translateX(-100%);transition:transform 0.26s cubic-bezier(0.4,0,0.2,1);box-shadow:4px 0 24px rgba(0,0,0,0.13);display:flex;flex-direction:column }
        .sidebar.open { transform:translateX(0) }
        .sidebar-hd { display:flex;align-items:center;justify-content:space-between;padding:20px 18px 16px;border-bottom:1.5px solid #f1f5f9 }
        .sidebar-brand { display:flex;align-items:center;gap:8px;font-size:0.78rem;font-weight:800;letter-spacing:0.13em;text-transform:uppercase;color:#fc5858 }
        .sidebar-brand-dot { width:8px;height:8px;background:#fc5858;border-radius:50%;box-shadow:0 0 0 3px rgba(252,88,88,0.25) }
        .sidebar-close { width:28px;height:28px;border-radius:8px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s }
        .sidebar-close:hover { background:#fee2e2;border-color:#fecaca;color:#dc2626 }
        .sidebar-label { padding:16px 18px 6px;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#94a3b8 }
        .sidebar-item { display:flex;align-items:center;gap:12px;padding:11px 18px;margin:2px 10px;border-radius:10px;font-size:0.88rem;font-weight:500;color:#334155;text-decoration:none;cursor:pointer;transition:background 0.14s }
        .sidebar-item:hover { background:#f8fafc;color:#1e293b }
        .sidebar-item.active { background:#fff1f1;color:#fc5858;font-weight:700 }
        .sidebar-item svg { flex-shrink:0;opacity:0.7 }
        .sidebar-item.active svg { opacity:1 }
        .sidebar-badge { display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;font-size:11px;font-weight:700;color:#fff;background:#DC2626;border-radius:10px;margin-left:auto }
        .sidebar-badge:empty { display:none }
        .sidebar-ft { margin-top:auto;padding:16px 18px;border-top:1.5px solid #f1f5f9 }
        .sidebar-ft button { display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #fecaca;background:#fff5f5;color:#dc2626;font-size:0.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:background 0.15s }
        .sidebar-ft button:hover { background:#fee2e2 }

        .btn-menu { display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;flex-shrink:0;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;cursor:pointer;color:#64748b;transition:border-color 0.15s }
        .btn-menu:hover { border-color:#fc5858;color:#fc5858;background:#fff1f1 }

        /* ── Page layout ── */
        .page-header {
            display:flex;align-items:center;gap:14px;
            padding:20px 24px;border-bottom:1px solid #e2e8f0;background:#fff;
            position:sticky;top:0;z-index:50;
        }
        .page-header img { height:32px }
        .page-header h1 { font-size:1.1rem;font-weight:800;color:#1e293b }
        .page-content { max-width:1200px;margin:0 auto;padding:20px 24px }
        .page-toolbar {
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:16px;flex-wrap:wrap;gap:12px;
        }
        .page-toolbar h3 { font-size:15px;font-weight:700;color:#1e293b }
        .page-stats { font-size:13px;color:#64748b }

        /* ── Cards grid ── */
        .cards-grid {
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
            gap:14px;
        }

        /* ── Ficha card ── */
        .ficha-card {
            background:#fff;border:1px solid #e2e8f0;border-radius:12px;
            padding:16px;cursor:pointer;transition:all 0.15s;border-left:4px solid #D97706;
        }
        .ficha-card:hover { box-shadow:0 4px 16px rgba(0,0,0,0.08);transform:translateY(-1px) }
        .ficha-card-header { display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px }
        .ficha-card-name { font-size:14px;font-weight:700;color:#1e293b }
        .ficha-card-comercial { font-size:12px;color:#64748b;margin-bottom:6px }
        .ficha-badge { font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:4px;background:#FEF3C7;color:#D97706;white-space:nowrap }
        .ficha-card-meta { display:flex;align-items:center;gap:10px;font-size:12px;color:#64748b;flex-wrap:wrap }
        .ficha-tipo { font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;background:#f1f5f9;color:#475569 }
        .ficha-fecha { display:flex;align-items:center;gap:4px }

        /* ── Modal ── */
        .modal-overlay { position:fixed;inset:0;background:rgba(15,23,42,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.2s }
        .modal-overlay.active { opacity:1;visibility:visible }
        .modal { background:#fff;border-radius:16px;width:95%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 48px rgba(0,0,0,0.15) }
        .modal-header { display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e2e8f0 }
        .modal-header h2 { font-size:16px;font-weight:700 }
        .modal-close { background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;padding:4px }
        .modal-close:hover { color:#1e293b }
        .modal-body { padding:20px }
        .modal-footer { display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid #e2e8f0 }
        .form-group { margin-bottom:14px }
        .form-group label { display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px }
        .form-control { width:100%;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;transition:border-color 0.15s;box-sizing:border-box }
        .form-control:focus { outline:none;border-color:#4F46E5 }
        .form-row { display:flex;gap:12px }
        .form-row .form-group { flex:1 }
        .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.15s }
        .btn-primary { background:#4F46E5;color:#fff }
        .btn-primary:hover { background:#4338CA }
        .btn-secondary { background:#f1f5f9;color:#475569;border:1px solid #e2e8f0 }
        .btn-secondary:hover { background:#e2e8f0 }
        .btn-sm { padding:6px 12px;font-size:12px }

        /* ── Empty state ── */
        .empty-state { text-align:center;padding:60px 20px;color:#94a3b8 }
        .empty-state svg { width:48px;height:48px;margin-bottom:12px }
        .empty-state h3 { font-size:16px;color:#475569;margin-bottom:4px }
        .empty-state p { font-size:13px }

        /* ── Spinner ── */
        .spinner { width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#4F46E5;border-radius:50%;animation:spin 0.7s linear infinite }
        @keyframes spin { to { transform:rotate(360deg) } }
        .loading-center { display:flex;flex-direction:column;align-items:center;padding:48px;gap:12px;color:#64748b }

        /* ── Toast ── */
        #toast-container { position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none }
        .toast { display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:10px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.12);font-size:13px;font-weight:500;color:#1e293b;pointer-events:auto;transform:translateX(120%);opacity:0;transition:transform 0.3s cubic-bezier(.4,0,.2,1),opacity 0.3s;max-width:380px;border-left:4px solid #94a3b8 }
        .toast.show { transform:translateX(0);opacity:1 }
        .toast-icon { flex-shrink:0;display:flex;align-items:center }
        .toast-success { border-left-color:#10b981 } .toast-success .toast-icon { color:#10b981 }
        .toast-error { border-left-color:#ef4444 } .toast-error .toast-icon { color:#ef4444 }
        .toast-warning { border-left-color:#f59e0b } .toast-warning .toast-icon { color:#f59e0b }

        /* ── Loading overlay ── */
        #loading-overlay { position:fixed;inset:0;background:rgba(255,255,255,0.6);backdrop-filter:blur(2px);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 0.2s }
        #loading-overlay.active { opacity:1;visibility:visible }
        .loading-spinner { width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#4F46E5;border-radius:50%;animation:spin 0.7s linear infinite }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-hd">
            <div class="sidebar-brand"><span class="sidebar-brand-dot"></span> Yurest</div>
            <button class="sidebar-close" onclick="closeSidebar()">&#10005;</button>
        </div>
        <div class="sidebar-label">Secciones</div>
        <a href="lista.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Fichas de cliente
        </a>
        <a href="distribucion.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            Implementadores
        </a>
        <a href="bajas.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Bajas
        </a>
        <a href="sinasignar.html" class="sidebar-item active">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/></svg>
            Sin asignar <span class="sidebar-badge" id="badge-sinasignar"></span>
        </a>
        <a href="proyectos.html" class="sidebar-item">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>

        </a>
        <div class="sidebar-ft">

                Cerrar menu
            </button>
        </div>

    <!-- HEADER -->
    <div class="page-header">
        <button class="btn-menu" onclick="openSidebar()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <img src="https://www.yurest.com/wp-content/uploads/2022/10/logotipo-yurest-rojo.png" alt="Yurest">
        <h1>Proyectos sin asignar</h1>
    </div>

    <!-- CONTENT -->
    <div class="page-content">
        <div class="page-toolbar">
            <div>
                <h3>Fichas de alta sin proyecto</h3>
                <div class="page-stats" id="fichas-stats"></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="cargarFichas()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                Recargar
            </button>
        </div>
        <div class="cards-grid" id="fichas-grid"></div>
    </div>

    <!-- MODAL: Asignar Proyecto -->
    <div class="modal-overlay" id="modal-asignar">
        <div class="modal">
            <div class="modal-header">
                <h2>Asignar Proyecto</h2>
                <button class="modal-close" onclick="cerrarModal('modal-asignar')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="asignar-ficha-idx">
                <div class="form-group">
                    <label>Cliente</label>
                    <input type="text" id="asignar-cliente" class="form-control" readonly>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo</label>
                        <input type="text" id="asignar-tipo" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label>Fecha alta</label>
                        <input type="text" id="asignar-fecha" class="form-control" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Implementador</label>
                        <select id="asignar-implementador" class="form-control"></select>
                    </div>
                    <div class="form-group">
                        <label>Plantilla</label>
                        <select id="asignar-plantilla" class="form-control"></select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal('modal-asignar')">Cancelar</button>
                <button class="btn btn-primary" onclick="crearProyectoDesdeAlta()">Crear Proyecto</button>
            </div>
        </div>
    </div>

    <script src="js-gestor/data.js"></script>
    <script>
    // ==========================================
    // Sin Asignar - Standalone Page
    // ==========================================

    let fichasSinAsignar = [];
    let proyectos = [];

    document.addEventListener('DOMContentLoaded', async () => {
        showLoading();
        try {
            await cargarPlantillas();
            proyectos = await cargarProyectos();
        } catch (_) { proyectos = []; }
        hideLoading();
        cargarFichas();

        // Close modals on overlay click / ESC
        document.querySelectorAll('.modal-overlay').forEach(ov => {
            ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('active'); });
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
        });
    });

    async function cargarFichas() {
        const grid = document.getElementById('fichas-grid');
        grid.innerHTML = '<div class="loading-center"><div class="spinner"></div><p>Cargando fichas de alta...</p></div>';

        try {
            const res = await fetch(WEBHOOK_ALTAS, { method: 'GET', headers: getAuthHeaders() });
            if (!res.ok) throw new Error('Error ' + res.status);
            let data = {};
            try { data = await res.json(); } catch (_) {}
            const raw = Array.isArray(data) ? data
                : Array.isArray(data.clientes) ? data.clientes
                : Array.isArray(data.data) ? data.data : [];

            const todas = raw.map(normalizarAlta).filter(a => a.nombre);
            const nombresExistentes = new Set(proyectos.map(p => p.cliente.toLowerCase().trim()));
            fichasSinAsignar = todas.filter(a => !nombresExistentes.has(a.nombre.toLowerCase().trim()));

            document.getElementById('fichas-stats').textContent =
                `${fichasSinAsignar.length} fichas sin proyecto (de ${todas.length} totales)`;
            const badge = document.getElementById('badge-sinasignar');
            if (badge) badge.textContent = fichasSinAsignar.length > 0 ? fichasSinAsignar.length : '';
            renderFichas();
        } catch (err) {
            grid.innerHTML = `<div class="empty-state">
                <p style="color:#ef4444">No se pudieron cargar las fichas</p>
                <p style="font-size:12px;margin-top:4px">${escapeHtml(err.message)}</p>
                <button class="btn btn-secondary btn-sm" style="margin-top:12px" onclick="cargarFichas()">Reintentar</button>
            </div>`;
        }
    }

    function renderFichas() {
        const grid = document.getElementById('fichas-grid');
        if (fichasSinAsignar.length === 0) {
            grid.innerHTML = `<div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <h3>Todo asignado</h3>
                <p>Todas las fichas de alta ya tienen proyecto creado</p>
            </div>`;
            return;
        }

        grid.innerHTML = fichasSinAsignar.map((f, i) => `
            <div class="ficha-card" onclick="abrirModalAsignar(${i})">
                <div class="ficha-card-header">
                    <span class="ficha-card-name">${escapeHtml(f.nombre)}</span>
                    <span class="ficha-badge">Sin asignar</span>
                </div>
                ${f.nombreComercial && f.nombreComercial !== f.nombre ? `<div class="ficha-card-comercial">${escapeHtml(f.nombreComercial)}</div>` : ''}
                <div class="ficha-card-meta">
                    <span class="ficha-tipo">${escapeHtml(f.tipoOriginal || f.tipo)}</span>
                    ${f.fecha ? `<span class="ficha-fecha">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        ${escapeHtml(f.fecha)}
                    </span>` : ''}
                    ${f.implementador ? `<span>${escapeHtml(f.implementador)}</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    function abrirModalAsignar(idx) {
        const f = fichasSinAsignar[idx];
        if (!f) return;
        document.getElementById('asignar-ficha-idx').value = idx;
        document.getElementById('asignar-cliente').value = f.nombre;
        document.getElementById('asignar-tipo').value = f.tipoOriginal || f.tipo;
        document.getElementById('asignar-fecha').value = f.fecha || '—';

        const selImpl = document.getElementById('asignar-implementador');
        selImpl.innerHTML = IMPLEMENTADORES.map(impl => `<option value="${impl}">${impl}</option>`).join('');

        const selPl = document.getElementById('asignar-plantilla');
        selPl.innerHTML = plantillas.map(p => `<option value="${p.id}">${escapeHtml(p.nombre)}</option>`).join('');

        abrirModal('modal-asignar');
    }

    async function crearProyectoDesdeAlta() {
        const idx = parseInt(document.getElementById('asignar-ficha-idx').value);
        const f = fichasSinAsignar[idx];
        if (!f) return;

        const implementador = document.getElementById('asignar-implementador').value;
        const plantillaId = document.getElementById('asignar-plantilla').value;

        showLoading();
        try {
            const nuevoProyecto = {
                id: generarId(),
                cliente: f.nombre,
                implementador,
                tipo: f.tipo,
                estado: 'activo',
                fechaInicio: f.fecha ? formatearFechaISO(f.fecha) : new Date().toISOString().split('T')[0],
                ultimaActividad: new Date().toISOString().split('T')[0],
                secciones: plantillaId ? crearEstructuraDesdePlantilla(plantillaId) : crearEstructuraProyecto(),
                anotaciones: '',
                asanaProjectId: '',
                tpv: f.tpv || ''
            };

            await crearProyectoAPI(nuevoProyecto).catch(() => {});
            proyectos.push(nuevoProyecto);
            guardarProyectosLocal(proyectos);

            fichasSinAsignar.splice(idx, 1);
            document.getElementById('fichas-stats').textContent =
                `${fichasSinAsignar.length} fichas sin proyecto`;
            renderFichas();
            cerrarModal('modal-asignar');
            mostrarToast(`Proyecto creado para ${f.nombre}`, 'success');
        } catch (err) {
            mostrarToast('Error: ' + err.message, 'error');
        } finally {
            hideLoading();
        }
    }

    function formatearFechaISO(fechaStr) {
        if (!fechaStr) return new Date().toISOString().split('T')[0];
        const d = new Date(fechaStr);
        if (!isNaN(d.getTime())) return d.toISOString().split('T')[0];
        const parts = fechaStr.split('/');
        if (parts.length === 3) {
            const [day, month, year] = parts;
            return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
        }
        return new Date().toISOString().split('T')[0];
    }

    // ── Helpers ──
    function escapeHtml(t) { const d=document.createElement('div');d.textContent=t;return d.innerHTML }
    function abrirModal(id) { document.getElementById(id).classList.add('active') }
    function cerrarModal(id) { document.getElementById(id).classList.remove('active') }
    function openSidebar() { document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open') }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open') }

    function mostrarToast(msg, tipo) {
        let c = document.getElementById('toast-container');
        if (!c) { c=document.createElement('div');c.id='toast-container';document.body.appendChild(c) }
        const t=document.createElement('div');
        t.className='toast toast-'+tipo;
        t.innerHTML='<span class="toast-icon">'+({success:'&#10003;',error:'&#10007;',warning:'&#9888;'}[tipo]||'&#8505;')+'</span><span>'+escapeHtml(msg)+'</span>';
        c.appendChild(t);
        requestAnimationFrame(()=>t.classList.add('show'));
        setTimeout(()=>{t.classList.remove('show');t.addEventListener('transitionend',()=>t.remove())},4000);
    }

    function showLoading() {
        let o=document.getElementById('loading-overlay');
        if(!o){o=document.createElement('div');o.id='loading-overlay';o.innerHTML='<div class="loading-spinner"></div>';document.body.appendChild(o)}
        o.classList.add('active');
    }
    function hideLoading() { const o=document.getElementById('loading-overlay');if(o)o.classList.remove('active') }
    </script>
</body>
</html>
