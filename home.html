<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Yurest — Portal</title>
    <link rel="stylesheet" href="fonts.css">
    <script src="config.js"></script>
    <script>YurestConfig.requireAuth();</script>
    <script src="notifications.js" defer></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --primary:#fc5858;
            --primary-dark:#e84848;
            --text:#0f172a;
            --text-muted:#64748b;
            --border:#e2e8f0;
            --bg:#f8fafc;
            --card:#ffffff;
        }

        body {
            font-family: var(--font-sans);
            color: var(--text);
            min-height: 100vh;
            background:
                radial-gradient(circle at 0% 0%, rgba(252,88,88,.08) 0%, transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(79,70,229,.06) 0%, transparent 55%),
                var(--bg);
            display:flex; flex-direction:column;
        }

        /* ── Top bar ──────────────────────────────────────────────────── */
        .home-top {
            display:flex; align-items:center; justify-content:space-between;
            padding:18px 32px;
        }
        .home-brand {
            display:flex; align-items:center; gap:12px;
        }
        .home-brand img { height:28px; width:auto; }
        .home-user {
            display:flex; align-items:center; gap:12px;
            font-size:13px; color:var(--text-muted);
        }
        .home-btn-logout {
            padding:7px 14px; background:#fff;
            border:1.5px solid var(--border); border-radius:999px;
            font-family:inherit; font-size:13px; font-weight:600;
            color:var(--text-muted); cursor:pointer;
            display:inline-flex; align-items:center; gap:6px;
            transition: all .15s;
        }
        .home-btn-logout:hover {
            color:var(--primary); border-color:#fecaca;
            background:#fff5f5;
        }

        /* ── Main ─────────────────────────────────────────────────────── */
        .home-main {
            flex:1; display:flex; flex-direction:column;
            padding:24px 32px 48px;
            max-width:1200px; width:100%;
            margin:0 auto;
        }
        .home-hero {
            margin: 24px 0 32px;
        }
        .home-hero h1 {
            font-size: clamp(28px, 4vw, 42px);
            font-weight:800; letter-spacing:-0.02em;
            color:var(--text);
        }
        .home-hero h1 .accent { color:var(--primary); }
        .home-hero p {
            margin-top:8px; font-size:15px; color:var(--text-muted);
        }

        /* ── Department grid ──────────────────────────────────────────── */
        .dept-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }
        .dept-card {
            position:relative;
            background:var(--card);
            border:1.5px solid var(--border);
            border-radius:20px;
            padding:24px 22px;
            cursor:pointer;
            text-align:left;
            transition: transform .18s ease-out, box-shadow .18s ease-out, border-color .18s;
            display:flex; flex-direction:column; gap:10px;
            min-height:170px;
        }
        .dept-card::before {
            content:'';
            position:absolute; inset:0;
            border-radius:inherit;
            background: linear-gradient(135deg, var(--dept-a, #fc5858) 0%, var(--dept-b, #e84848) 100%);
            opacity:0; transition: opacity .18s;
            z-index:-1;
        }
        .dept-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(15,23,42,.08);
            border-color: var(--dept-a, var(--primary));
        }
        .dept-card-top {
            display:flex; align-items:flex-start; justify-content:space-between;
        }
        .dept-icon {
            width:52px; height:52px; border-radius:14px;
            display:inline-flex; align-items:center; justify-content:center;
            background: linear-gradient(135deg, var(--dept-a, #fc5858) 0%, var(--dept-b, #e84848) 100%);
            color:#fff;
        }
        .dept-icon svg { width:26px; height:26px; }
        .dept-badge {
            display:inline-flex; align-items:center; gap:4px;
            font-size:11px; font-weight:700;
            padding:3px 10px; border-radius:999px;
            background:#fef3c7; color:#92400e;
        }
        .dept-badge.ok { background:#dcfce7; color:#166534; }
        .dept-badge.none { display:none; }
        .dept-name {
            font-size:20px; font-weight:700; color:var(--text);
            margin-top:4px;
        }
        .dept-sub {
            font-size:13px; color:var(--text-muted);
            line-height:1.4;
        }
        .dept-footer {
            margin-top:auto; display:flex; align-items:center; justify-content:space-between;
            padding-top:10px;
        }
        .dept-count {
            font-size:12px; font-weight:600; color:var(--text-muted);
        }
        .dept-arrow {
            color:var(--text-muted); transition: transform .15s, color .15s;
        }
        .dept-card:hover .dept-arrow {
            transform: translateX(3px);
            color: var(--dept-a, var(--primary));
        }

        /* ── Expanded department view ─────────────────────────────────── */
        .dept-detail {
            display:none;
        }
        .dept-detail.active { display:block; }

        .dept-detail-header {
            display:flex; align-items:flex-start; gap:18px;
            margin-bottom:28px;
        }
        .dept-back {
            display:inline-flex; align-items:center; gap:6px;
            padding:8px 14px;
            background:#fff; border:1.5px solid var(--border); border-radius:999px;
            font-family:inherit; font-size:13px; font-weight:600;
            color:var(--text); cursor:pointer;
            transition: all .15s;
        }
        .dept-back:hover {
            background:#f1f5f9; border-color:#cbd5e1;
        }
        .dept-detail-title {
            flex:1;
        }
        .dept-detail-title h2 {
            font-size:26px; font-weight:800; letter-spacing:-0.01em;
        }
        .dept-detail-title p {
            font-size:14px; color:var(--text-muted); margin-top:4px;
        }
        .dept-detail-icon {
            width:60px; height:60px; border-radius:16px;
            display:inline-flex; align-items:center; justify-content:center;
            background: linear-gradient(135deg, var(--dept-a) 0%, var(--dept-b) 100%);
            color:#fff; flex-shrink:0;
        }
        .dept-detail-icon svg { width:30px; height:30px; }

        .page-grid {
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
        }
        .page-card {
            background:var(--card);
            border:1.5px solid var(--border);
            border-radius:14px;
            padding:16px 18px;
            text-decoration:none; color:inherit;
            cursor:pointer;
            display:flex; align-items:center; gap:14px;
            transition: all .15s;
        }
        .page-card:hover {
            border-color: var(--dept-a, var(--primary));
            box-shadow: 0 6px 18px rgba(15,23,42,.06);
            transform: translateY(-2px);
        }
        .page-card-icon {
            width:40px; height:40px; border-radius:10px;
            display:inline-flex; align-items:center; justify-content:center;
            background: rgba(252,88,88,.09);
            color: var(--dept-a, var(--primary));
            flex-shrink:0;
        }
        .page-card-icon svg { width:20px; height:20px; }
        .page-card-body { flex:1; min-width:0; }
        .page-card-name {
            font-size:15px; font-weight:700; color:var(--text);
            display:flex; align-items:center; gap:8px;
        }
        .page-card-name .page-badge {
            display:inline-flex; align-items:center;
            font-size:10px; font-weight:700;
            padding:2px 8px; border-radius:999px;
            background:#fef3c7; color:#92400e;
        }
        .page-card-sub {
            font-size:12px; color:var(--text-muted);
            margin-top:2px;
        }
        .page-card-arrow {
            color:var(--text-muted); transition: transform .15s;
        }
        .page-card:hover .page-card-arrow {
            transform: translateX(3px);
        }

        /* ── Footer docs ──────────────────────────────────────────────── */
        .home-footer {
            margin-top:auto; padding:18px 32px;
            display:flex; align-items:center; justify-content:center; gap:10px;
            flex-wrap:wrap;
        }
        .home-docs-btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:6px 12px; background:transparent;
            border:1.5px solid var(--border); border-radius:999px;
            font-family:inherit; font-size:12px; font-weight:600;
            color:var(--text-muted); cursor:pointer;
            text-decoration:none;
            transition: all .15s;
        }
        .home-docs-btn:hover {
            color:var(--text); border-color:#94a3b8; background:#fff;
        }

        /* ── Responsive ───────────────────────────────────────────────── */
        @media (max-width: 640px) {
            .home-top { padding:14px 16px; }
            .home-main { padding:16px 16px 32px; }
            .home-hero { margin: 16px 0 24px; }
            .dept-card { padding:20px 18px; min-height:150px; }
            .home-btn-logout span { display:none; }
        }
    </style>
</head>

                { id: 'updates',      href: 'updates.html',      label: 'Updates',      sub: 'Novedades y funcionalidades del portal', icon: 'updates', public: true }

            requiereAdmin: true,

                { id: 'admin', href: 'admin.html', label: 'Usuarios y permisos', sub: 'Gestionar accesos del equipo', icon: 'admin' }

    // Filtra departamentos según permisos del usuario logueado. Un
    // departamento se muestra si al menos una de sus páginas está en los
    // permisos. Los de requiereAdmin sólo se ven si rol=admin.
    function filtrarDepartamentos() {
        const permisos = new Set(YurestConfig.getPermisos());
        const esAdminUser = YurestConfig.esAdmin();
        return DEPARTAMENTOS
            .map(d => {
                if (d.requiereAdmin && !esAdminUser) return null;
                // Páginas con `public: true` se muestran a cualquier usuario
                // autenticado sin necesidad de permiso en la tabla usuarios.
                const visiblePaginas = d.paginas.filter(p => p.public || permisos.has(p.id));
                if (visiblePaginas.length === 0) return null;
                return { ...d, paginas: visiblePaginas };
            })
            .filter(Boolean);
    }

    // ─────────────────────────────────────────────────────────────────────
    //  Utilidades
    // ─────────────────────────────────────────────────────────────────────
    function escHtml(s) { return YurestConfig.escHtml(s); }
    function cerrarSesion() { YurestConfig.cerrarSesion(); }

    // ─────────────────────────────────────────────────────────────────────
    //  Render Vista 1: Grid de departamentos
    // ─────────────────────────────────────────────────────────────────────
    function renderGrid() {
        const grid = document.getElementById('dept-grid');
        const visibles = filtrarDepartamentos();

        if (visibles.length === 0) {
            grid.innerHTML = `
                <div style="grid-column:1/-1;text-align:center;padding:40px 20px;background:#fff;border:1.5px dashed var(--border);border-radius:16px;color:var(--text-muted);font-size:14px">
                    <div style="font-size:34px;margin-bottom:12px">🔒</div>
                    <p style="font-weight:700;color:var(--text);margin-bottom:4px">No tienes acceso a ninguna sección</p>
                    <p>Ponte en contacto con un administrador para que te asigne permisos.</p>
                </div>`;
            return;
        }

        grid.innerHTML = visibles.map(d => {
            const nPages = d.paginas.length;
            const badgeChildren = d.paginas.map(p => p.badgeId).filter(Boolean).join(',');
            return `
                <div class="dept-card"
                     style="--dept-a:${d.colorA};--dept-b:${d.colorB}"
                     onclick="abrirDepartamento('${d.id}')"
                     role="button" tabindex="0"
                     onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();abrirDepartamento('${d.id}')}">
                    <div class="dept-card-top">
                        <div class="dept-icon">${ICON[d.icon] || ''}</div>
                        <span class="dept-badge none"
                              id="home-badge-${d.id}"
                              data-children="${badgeChildren}"></span>
                    </div>
                    <div class="dept-name">${escHtml(d.nombre)}</div>
                    <div class="dept-sub">${escHtml(d.descripcion)}</div>
                    <div class="dept-footer">
                        <span class="dept-count">${nPages} secci${nPages === 1 ? 'ón' : 'ones'}</span>
                        <span class="dept-arrow">${ICON.arrowRight}</span>
                    </div>
                </div>`;
        }).join('');
    }

    // ─────────────────────────────────────────────────────────────────────
    //  Render Vista 2: Detalle de un departamento
    // ─────────────────────────────────────────────────────────────────────
    function renderDetalle(deptId) {
        // Usamos los filtrados para que un admin-only no sea accesible si
        // el usuario no es admin, y para ocultar páginas sin permiso dentro
        // de un departamento al que sí tiene acceso.
        const d = filtrarDepartamentos().find(x => x.id === deptId);
        if (!d) return false;

        document.getElementById('detail-name').textContent = d.nombre;
        document.getElementById('detail-sub').textContent = d.descripcion;
        const ic = document.getElementById('detail-icon');
        ic.innerHTML = ICON[d.icon] || '';
        ic.style.setProperty('--dept-a', d.colorA);
        ic.style.setProperty('--dept-b', d.colorB);
        ic.style.background = `linear-gradient(135deg, ${d.colorA} 0%, ${d.colorB} 100%)`;

        const pages = document.getElementById('detail-pages');
        pages.style.setProperty('--dept-a', d.colorA);
        pages.style.setProperty('--dept-b', d.colorB);
        pages.innerHTML = d.paginas.map(p => `
            <a class="page-card" href="${escHtml(p.href)}"
               style="--dept-a:${d.colorA};--dept-b:${d.colorB}">
                <div class="page-card-icon" style="color:${d.colorA};background:${d.colorA}15">
                    ${ICON[p.icon] || ''}
                </div>
                <div class="page-card-body">
                    <div class="page-card-name">
                        ${escHtml(p.label)}
                        ${p.badgeId ? `<span class="page-badge" id="page-${p.badgeId}"></span>` : ''}
                    </div>
                    <div class="page-card-sub">${escHtml(p.sub || '')}</div>
                </div>
                <div class="page-card-arrow">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
            </a>`).join('');

        return true;
    }

    // ─────────────────────────────────────────────────────────────────────
    //  Navegación entre vistas (usa URL ?d= para preservar back/forward)
    // ─────────────────────────────────────────────────────────────────────
    function mostrarVista(deptId) {
        const grid   = document.getElementById('view-grid');
        const detail = document.getElementById('view-detail');
        if (deptId && renderDetalle(deptId)) {
            grid.style.display = 'none';
            detail.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'instant' });
        } else {
            detail.classList.remove('active');
            grid.style.display = '';
        }
    }

    function abrirDepartamento(deptId) {
        const url = new URL(window.location.href);
        url.searchParams.set('d', deptId);
        history.pushState({ d: deptId }, '', url);
        mostrarVista(deptId);
    }

    function volverAHome() {
        const url = new URL(window.location.href);
        url.searchParams.delete('d');
        history.pushState({ d: null }, '', url);
        mostrarVista(null);
    }

    window.addEventListener('popstate', (e) => {
        const deptId = new URLSearchParams(window.location.search).get('d');
        mostrarVista(deptId);
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('view-detail').classList.contains('active')) {
            volverAHome();
        }
    });

    // ─────────────────────────────────────────────────────────────────────
    //  Badges informativos (sin asignar, A3)
    //  Reutilizamos los helpers del config.js pero escribimos en los
    //  elementos de esta página (hay dos: el del card y el del page item).
    // ─────────────────────────────────────────────────────────────────────
    async function cargarBadges() {
        // Creamos un "puente": los helpers de config.js buscan ids fijos
        // (badge-sinasignar, badge-a3). Creamos esos elementos ocultos aquí
        // y después copiamos el valor a los elementos visibles del home.
        if (!document.getElementById('badge-sinasignar')) {
            const s = document.createElement('span');
            s.id = 'badge-sinasignar';
            s.style.display = 'none';
            document.body.appendChild(s);
        }
        if (!document.getElementById('badge-a3')) {
            const s = document.createElement('span');
            s.id = 'badge-a3';
            s.style.display = 'none';
            document.body.appendChild(s);
        }

        if (YurestConfig.actualizarBadgeSinAsignar) await YurestConfig.actualizarBadgeSinAsignar();
        if (YurestConfig.actualizarBadgeA3)         await YurestConfig.actualizarBadgeA3();

        sincronizarBadgesHome();
    }

    function sincronizarBadgesHome() {
        // Copia el contenido de los badges ocultos (los que actualiza config.js)
        // a los visibles en cards y page items.
        const sinAsignar = parseInt(document.getElementById('badge-sinasignar')?.textContent || '', 10);
        const a3         = parseInt(document.getElementById('badge-a3')?.textContent || '', 10);

        // Page items
        document.querySelectorAll('#page-badge-sinasignar').forEach(el => {
            el.textContent = !isNaN(sinAsignar) && sinAsignar > 0 ? sinAsignar + ' pendientes' : '';
            el.style.display = (!isNaN(sinAsignar) && sinAsignar > 0) ? '' : 'none';
        });
        document.querySelectorAll('#page-badge-a3').forEach(el => {
            el.textContent = !isNaN(a3) && a3 > 0 ? a3 + ' pendientes' : '';
            el.style.display = (!isNaN(a3) && a3 > 0) ? '' : 'none';
        });

        // Dept cards (suma de sus hijos)
        document.querySelectorAll('.dept-badge[id^="home-badge-"]').forEach(badge => {
            const ids = (badge.dataset.children || '').split(',').filter(Boolean);
            let total = 0;
            ids.forEach(id => {
                const v = parseInt((document.getElementById(id)?.textContent || '').trim(), 10);
                if (!isNaN(v)) total += v;
            });
            if (total > 0) {
                badge.classList.remove('none');
                badge.textContent = total + ' pendiente' + (total === 1 ? '' : 's');
            } else {
                badge.classList.add('none');
                badge.textContent = '';
            }
        });
    }

    // Expose para que si config.js llama a _actualizarSidebarBadgesGrupos
    // también refresquemos los nuestros.
    window._actualizarSidebarBadgesGrupos = sincronizarBadgesHome;

    // ─────────────────────────────────────────────────────────────────────
    //  Bootstrap
    // ─────────────────────────────────────────────────────────────────────
    (function init() {
        // Info de usuario
        const session = YurestConfig.getSession();
        // Nombre completo para el saludo del hero. Fallback al username y
        // finalmente a 'Usuario'.
        const nombreCompleto = (session && (session.nombre || session.user)) || 'Usuario';
        document.getElementById('hero-user').textContent = nombreCompleto;

        renderGrid();

        // Vista inicial según query ?d=
        const deptId = new URLSearchParams(window.location.search).get('d');
        mostrarVista(deptId);

        cargarBadges();

        // Sección "Cosas por hacer": mismas fuentes que la campana del header
        // en el resto de páginas, filtradas por permisos del usuario.
        const todoEl = document.getElementById('todo-section');
        if (todoEl) {
            const paint = () => {
                if (window.YurestNotifications && window.YurestNotifications.renderInto) {
                    window.YurestNotifications.renderInto(todoEl);
                } else {
                    setTimeout(paint, 120);  // notifications.js tarda (defer)
                }
            };
            paint();
        }

        // Si el usuario fue redirigido aquí por falta de permiso sobre otra
        // página, mostramos un aviso claro y quitamos la marca.
        try {
            const denegado = sessionStorage.getItem('yurest_permiso_denegado');
            if (denegado) {
                sessionStorage.removeItem('yurest_permiso_denegado');
                setTimeout(() => mostrarAviso(
                    `No tienes permiso para acceder a "${denegado}". Pide acceso a un administrador.`,
                    'warn'
                ), 120);
            }
        } catch (_) {}
    })();

    function mostrarAviso(msg, tipo) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:2000;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.12);background:#fff;border:1.5px solid #fde68a;color:#92400e;max-width:90%;transition:opacity .2s';
        if (tipo === 'error') { t.style.borderColor = '#fca5a5'; t.style.color = '#b91c1c'; }
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 220); }, 5000);
    }
</script>
