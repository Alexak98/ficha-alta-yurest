<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <title>Documentación de integraciones — Yurest</title>
    <script src="config.js"></script>
    <!-- Sin permiso requerido: la página es documentación interna,
         todos los usuarios logueados pueden verla. Mismo patrón que
         churn-tecnico.html y updates.html. -->
    <script>YurestConfig.requireAuth();</script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background:#f8fafc }

        .page-content { padding:24px;max-width:1200px;margin:0 auto }
        .page-toolbar h2 { font-size:1.35rem;font-weight:700;color:#0f172a;margin:0 }
        .page-toolbar p  { font-size:.85rem;color:#64748b;margin:4px 0 0 }

        /* Buscador de integraciones — patrón filter-bar/search-input
           consistente con el resto del portal. */
        .toolbar-search {
            margin:18px 0 16px;
        }
        .search-wrap { position:relative;max-width:380px }
        .search-icon { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none }
        .search-input {
            width:100%;padding:9px 36px;font-family:inherit;font-size:.88rem;color:#1e293b;
            background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;
            transition:border-color .15s;
        }
        .search-input:focus { outline:none;border-color:#fc5858 }

        /* Lista de integraciones — estilo card por fila como en el ejemplo
           de haddock: icono cuadrado + nombre/descripción a la izquierda,
           botón a la derecha. Hover sutil para señalar interactividad. */
        .integraciones-wrap { background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;overflow:hidden }
        .int-row {
            display:flex;align-items:center;gap:14px;
            padding:14px 18px;
            border-bottom:1px solid #f1f5f9;
            transition:background .12s;
        }
        .int-row:last-child { border-bottom:0 }
        .int-row:hover      { background:#fafafa }
        .int-icon {
            flex:0 0 44px;width:44px;height:44px;border-radius:10px;
            background:linear-gradient(135deg, var(--c1, #fc5858), var(--c2, #c62828));
            color:#fff;font-weight:800;font-size:1.05rem;
            display:flex;align-items:center;justify-content:center;
            letter-spacing:.02em;
            user-select:none;
        }
        .int-meta { flex:1;min-width:0 }
        .int-meta-name {
            display:flex;align-items:center;gap:8px;flex-wrap:wrap;
            font-size:.95rem;font-weight:700;color:#0f172a;
        }
        .int-meta-tag {
            font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
            padding:2px 7px;border-radius:999px;
            background:#dcfce7;color:#15803d;
        }
        .int-meta-tag.beta { background:#fef3c7;color:#b45309 }
        .int-meta-tag.no   { background:#fee2e2;color:#991b1b }
        .int-meta-desc {
            font-size:.82rem;color:#64748b;margin-top:2px;line-height:1.4;
        }
        .int-action {
            flex:0 0 auto;padding:8px 16px;font-size:.84rem;font-weight:700;
            border-radius:9px;cursor:pointer;font-family:inherit;
            background:#fff;color:#334155;border:1.5px solid #e2e8f0;
            display:inline-flex;align-items:center;gap:6px;
            transition:background .12s,border-color .12s,color .12s;
        }
        .int-action:hover { background:#fc5858;border-color:#fc5858;color:#fff }
        .int-action svg   { transition:transform .12s }
        .int-action:hover svg { transform:translateX(2px) }

        .empty-search { padding:40px 20px;text-align:center;color:#94a3b8;font-size:.88rem }

        /* ──────────────────────────────────────────────────────────────
           Modal de documentación — diseño tipo "drawer-light" centrado.
           Cabecera con icono grande + nombre + descripción; cuerpo con
           secciones (Cómo conectar, Datos sincronizados, Limitaciones,
           Contacto soporte). Diseño consistente con otros modales del
           portal.
           ────────────────────────────────────────────────────────────── */
        .doc-overlay {
            position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:900;
            display:none;align-items:center;justify-content:center;padding:20px;
        }
        .doc-overlay.open { display:flex }
        .doc-modal {
            background:#fff;border-radius:14px;width:100%;max-width:760px;
            max-height:88vh;display:flex;flex-direction:column;
            box-shadow:0 20px 60px rgba(0,0,0,.22);
            overflow:hidden;
        }
        .doc-header {
            padding:20px 24px;
            display:flex;align-items:center;gap:14px;
            border-bottom:1px solid #f1f5f9;
            background:linear-gradient(180deg, #fff, #f8fafc);
        }
        .doc-header-icon {
            flex:0 0 56px;width:56px;height:56px;border-radius:14px;
            background:linear-gradient(135deg, var(--c1, #fc5858), var(--c2, #c62828));
            color:#fff;font-weight:800;font-size:1.4rem;
            display:flex;align-items:center;justify-content:center;
        }
        .doc-header-meta { flex:1;min-width:0 }
        .doc-header-name { font-size:1.15rem;font-weight:800;color:#0f172a;margin:0 }
        .doc-header-desc { font-size:.84rem;color:#64748b;margin:3px 0 0;line-height:1.4 }
        .doc-close {
            flex:0 0 36px;width:36px;height:36px;border-radius:10px;
            border:1.5px solid #e2e8f0;background:#fff;color:#64748b;
            font-size:1.1rem;font-family:inherit;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            transition:background .12s, color .12s, border-color .12s;
        }
        .doc-close:hover { background:#fee2e2;border-color:#fecaca;color:#dc2626 }

        .doc-body {
            flex:1;overflow-y:auto;padding:20px 24px 24px;
        }
        .doc-section { margin-bottom:18px }
        .doc-section:last-child { margin-bottom:0 }
        .doc-section-title {
            display:flex;align-items:center;gap:7px;
            font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
            color:#64748b;margin-bottom:8px;
        }
        .doc-section-title svg { stroke:#94a3b8 }
        .doc-section-content {
            font-size:.88rem;color:#334155;line-height:1.55;
        }
        .doc-section-content p { margin:0 0 8px }
        .doc-section-content p:last-child { margin-bottom:0 }
        .doc-section-content ul { margin:0;padding-left:20px }
        .doc-section-content li { margin-bottom:4px }
        .doc-section-content strong { color:#0f172a }
        .doc-section-content code {
            font-family:var(--font-mono);font-size:.78rem;
            background:#f1f5f9;color:#475569;padding:1px 6px;border-radius:5px;
        }
        .doc-section-content a { color:#fc5858;text-decoration:none;font-weight:600 }
        .doc-section-content a:hover { text-decoration:underline }

        /* Tarjeta de "campos requeridos" — layout key/value compacto. */
        .doc-fields {
            background:#fafbfc;border:1.5px solid #e2e8f0;border-radius:10px;
            padding:10px 14px;
        }
        .doc-field { display:flex;gap:12px;padding:6px 0;border-bottom:1px dashed #e2e8f0 }
        .doc-field:last-child { border-bottom:0 }
        .doc-field-key { flex:0 0 130px;font-size:.78rem;font-weight:700;color:#475569 }
        .doc-field-val { flex:1;font-size:.82rem;color:#0f172a }

        /* Plantilla de email al cliente — bloque tipo "code" con botón
           de copiar al portapapeles. Wrapper relativo para anclar el
           botón; el <pre> interno se ocupa del texto con pre-wrap.
           Es CRÍTICO que el botón NO esté dentro de un elemento con
           white-space:pre-wrap, porque los saltos/espacios de la
           indentación del template literal se renderizarían como texto
           y descolocarían el contenido. */
        .doc-tplmail-wrap {
            position:relative;
            background:#0f172a;
            border-radius:10px;
            overflow:hidden;
        }
        .doc-tplmail {
            color:#e2e8f0;
            margin:0;
            padding:36px 16px 14px;       /* top más alto para no chocar con el botón */
            font-family:var(--font-mono, ui-monospace, SFMono-Regular, Menlo, monospace);
            font-size:.78rem;line-height:1.5;
            white-space:pre-wrap;word-break:break-word;
            background:transparent;border:0;
        }
        .doc-tplmail-copy {
            position:absolute;top:8px;right:8px;
            padding:5px 10px;font-size:.7rem;font-weight:700;
            background:#1e293b;color:#cbd5e1;border:1px solid #334155;
            border-radius:7px;cursor:pointer;font-family:inherit;
            display:inline-flex;align-items:center;gap:5px;
            transition:background .12s,color .12s,border-color .12s;
            z-index:1;
        }
        .doc-tplmail-copy:hover { background:#334155;color:#fff;border-color:#64748b }
        .doc-tplmail-copy.copied { background:#15803d;color:#fff;border-color:#15803d }

        @media (max-width: 640px) {
            .int-row { flex-wrap:wrap }
            .int-action { width:100%;justify-content:center }
            .doc-modal { max-height:96vh }
            .doc-header { padding:16px 18px }
            .doc-body   { padding:16px 18px 20px }
            .doc-field-key { flex-basis:100px }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="sidebar.js"></script>
    <script>YurestSidebar.render('documentacion_integraciones');</script>
    <script src="notifications.js"></script>

    <div class="page-header">
        <button class="btn-menu" onclick="openSidebar()" title="Menú">
            <svg aria-hidden="true" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1>Documentación de integraciones</h1>
    </div>

    <div class="page-content">
        <!-- Subtítulo del page-header (sin h2 duplicado: el título de la
             página ya es \"Documentación de integraciones\" arriba). -->
        <p style="font-size:.86rem;color:#64748b;margin:0 0 14px">
            Cómo conectar Yurest con cada TPV. Pulsa cualquier integración para ver los pasos, datos requeridos y contacto de soporte.
        </p>

        <div class="toolbar-search">
            <div class="search-wrap">
                <svg aria-hidden="true" class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="f-q" class="search-input" type="search" placeholder="Buscar integración…" oninput="renderLista()">
            </div>
        </div>

        <div class="integraciones-wrap" id="lista-wrap"></div>
    </div>

    <!-- Modal de documentación — se llena dinámicamente al pulsar
         "Ver documentación" en una integración. -->
    <div class="doc-overlay" id="doc-overlay" onclick="if (event.target === this) cerrarDoc()">
        <div class="doc-modal" role="dialog" aria-modal="true" aria-labelledby="doc-name">
            <div class="doc-header">
                <div class="doc-header-icon" id="doc-icon">—</div>
                <div class="doc-header-meta">
                    <h3 class="doc-header-name" id="doc-name">—</h3>
                    <p class="doc-header-desc" id="doc-desc">—</p>
                </div>
                <button class="doc-close" onclick="cerrarDoc()" aria-label="Cerrar">×</button>
            </div>
            <div class="doc-body" id="doc-body"></div>
        </div>
    </div>

<script>
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

// ──────────────────────────────────────────────────────────────────────
// Catálogo de integraciones. Cada entrada es 100% estática (es
// documentación interna, no hay BD detrás). Estructura:
//
//   id        — identificador único, slug
//   nombre    — texto que se muestra en la lista y en la cabecera del modal
//   tag       — opcional. 'estable' | 'beta' | 'no_disponible'. Se pinta
//               como pill al lado del nombre.
//   desc      — descripción corta (una línea, ~80 caracteres) para la lista
//   inicial   — letra/dos letras del icono cuadrado (placeholder del logo)
//   c1, c2    — colores del gradiente del icono (opcional, defaults al rojo)
//   doc       — objeto con las secciones del modal:
//       descripcion       — párrafo introductorio largo (1-3 frases)
//       comoConectar      — pasos numerados que sigue el equipo de Yurest
//                           para conectar la integración con el TPV.
//       camposRequeridos  — lista de pares clave/valor de credenciales que
//                           hay que pedir al cliente.
//       datosSincronizados — qué datos viajan del TPV a Yurest.
//       limitaciones      — array de strings con caveats conocidos.
//       contacto          — { nombre, email, telefono?, web? } del soporte
//                           del fabricante del TPV (cuando aplica).
//       notas             — opcional. Texto libre extra al final.
//
// Si quieres añadir una integración nueva, copia un objeto de los de abajo
// y rellena. La página la coge automáticamente. No hay que tocar el resto.
// ──────────────────────────────────────────────────────────────────────

function renderLista() {
    const q = document.getElementById('f-q').value.trim().toLowerCase();
    const lista = INTEGRACIONES.filter(i =>
        !q
        || i.nombre.toLowerCase().includes(q)
        || i.desc.toLowerCase().includes(q)
        || (i.id || '').toLowerCase().includes(q)
    );
    const wrap = document.getElementById('lista-wrap');
    if (lista.length === 0) {
        wrap.innerHTML = '<div class="empty-search">No hay ninguna integración que coincida con esa búsqueda.</div>';
        return;
    }
    const esc = YurestConfig.escHtml;
    wrap.innerHTML = lista.map(i => {
        const tagHtml = i.tag === 'beta'           ? '<span class="int-meta-tag beta">Beta</span>'
                      : i.tag === 'no_disponible'  ? '<span class="int-meta-tag no">No disponible</span>'
                      : i.tag === 'estable'        ? '<span class="int-meta-tag">Operativa</span>'
                                                   : '';
        const styleVars = `--c1:${esc(i.c1 || '#fc5858')};--c2:${esc(i.c2 || '#c62828')}`;
        return `
            <div class="int-row">
                <div class="int-icon" style="${styleVars}">${esc(i.inicial || i.nombre.slice(0,2).toUpperCase())}</div>
                <div class="int-meta">
                    <div class="int-meta-name">${esc(i.nombre)}${tagHtml}</div>
                    <div class="int-meta-desc">${esc(i.desc)}</div>
                </div>
                <button class="int-action" onclick="abrirDoc('${esc(i.id)}')">
                    Ver documentación
                    <svg aria-hidden="true" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>`;
    }).join('');
}

// ──────────────────────────────────────────────────────────────────────
// Modal de documentación
// ──────────────────────────────────────────────────────────────────────
function abrirDoc(id) {
    const i = INTEGRACIONES.find(x => x.id === id);
    if (!i) return;
    const esc = YurestConfig.escHtml;
    const d = i.doc || {};

    document.getElementById('doc-icon').textContent = i.inicial || i.nombre.slice(0,2).toUpperCase();
    document.getElementById('doc-icon').style.cssText = `--c1:${i.c1 || '#fc5858'};--c2:${i.c2 || '#c62828'}`;
    document.getElementById('doc-name').textContent = i.nombre;
    document.getElementById('doc-desc').textContent = i.desc || '';

    const partes = [];

    if (d.descripcion) {
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    Descripción
                </div>
                <div class="doc-section-content">${escMd(d.descripcion)}</div>
            </div>`);
    }

    if (Array.isArray(d.comoConectar) && d.comoConectar.length) {
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11H5a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h4"/><path d="M15 11h4a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-4"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                    Cómo conectarla
                </div>
                <div class="doc-section-content"><ol style="margin:0;padding-left:20px">${
                    d.comoConectar.map(p => `<li>${escMd(p)}</li>`).join('')
                }</ol></div>
            </div>`);
    }

    if (Array.isArray(d.camposRequeridos) && d.camposRequeridos.length) {
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Datos a pedir al cliente
                </div>
                <div class="doc-section-content">
                    <div class="doc-fields">${
                        d.camposRequeridos.map(c => `
                            <div class="doc-field">
                                <div class="doc-field-key">${esc(c.k)}</div>
                                <div class="doc-field-val">${esc(c.v)}</div>
                            </div>`).join('')
                    }</div>
                </div>
            </div>`);
    }

    // Plantilla de email — bloque copiable al portapapeles. Se pinta
    // ANTES de "Datos sincronizados" porque es el siguiente paso natural
    // del flujo (ya hemos enumerado qué datos pedir → ahora damos el
    // texto listo para mandar al cliente).
    if (d.plantillaEmail) {
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    Plantilla email al cliente
                </div>
                <div class="doc-section-content">
                    <div class="doc-tplmail-wrap">
                        <button class="doc-tplmail-copy" onclick="copiarPlantilla('${esc(i.id)}', this)">
                            <svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                            Copiar
                        </button><pre class="doc-tplmail" id="doc-tplmail-${esc(i.id)}">${esc(d.plantillaEmail)}</pre>
                    </div>
                </div>
            </div>`);
    }

    if (Array.isArray(d.datosSincronizados) && d.datosSincronizados.length) {
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    Datos que se sincronizan
                </div>
                <div class="doc-section-content"><ul>${
                    d.datosSincronizados.map(x => `<li>${escMd(x)}</li>`).join('')
                }</ul></div>
            </div>`);
    }

    if (Array.isArray(d.limitaciones) && d.limitaciones.length) {
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    Limitaciones conocidas
                </div>
                <div class="doc-section-content"><ul>${
                    d.limitaciones.map(x => `<li>${escMd(x)}</li>`).join('')
                }</ul></div>
            </div>`);
    }

    if (d.contacto) {
        const c = d.contacto;
        const items = [];
        if (c.nombre)   items.push(`<strong>${esc(c.nombre)}</strong>`);
        if (c.email)    items.push(`<a href="mailto:${esc(c.email)}">${esc(c.email)}</a>`);
        if (c.telefono) items.push(`<a href="tel:${esc(c.telefono).replace(/\s/g,'')}">${esc(c.telefono)}</a>`);
        if (c.web)      items.push(`<a href="${esc(c.web)}" target="_blank" rel="noopener noreferrer">${esc(c.web.replace(/^https?:\/\//,''))}</a>`);
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    Contacto soporte fabricante
                </div>
                <div class="doc-section-content">${items.join(' · ')}</div>
            </div>`);
    }

    if (d.notas) {
        partes.push(`
            <div class="doc-section">
                <div class="doc-section-title">
                    <svg aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    Notas
                </div>
                <div class="doc-section-content">${escMd(d.notas)}</div>
            </div>`);
    }

    document.getElementById('doc-body').innerHTML = partes.join('') || '<div class="empty-search">Esta integración aún no tiene documentación detallada.</div>';

    document.getElementById('doc-overlay').classList.add('open');
    if (YurestConfig.a11yAbrirModal) YurestConfig.a11yAbrirModal('doc-overlay');
}
function cerrarDoc() {
    document.getElementById('doc-overlay').classList.remove('open');
    if (YurestConfig.a11yCerrarModal) YurestConfig.a11yCerrarModal('doc-overlay');
}

// Mini-helper de escape + permitir **negrita** y `código` en líneas de
// texto. No se mezcla con marked porque sería overkill para textos cortos.
function escMd(s) {
    if (s == null) return '';
    let out = YurestConfig.escHtml(String(s));
    out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
    return out;
}

// Atajos de teclado: Esc cierra el modal.
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('doc-overlay').classList.contains('open')) {
        cerrarDoc();
    }
});

// Copia al portapapeles la plantilla de email de la integración. Llama el
// botón "Copiar" del bloque .doc-tplmail. Usa navigator.clipboard si está
// (HTTPS / localhost), si no fallback a un textarea + execCommand.
async function copiarPlantilla(id, btn) {
    const integ = INTEGRACIONES.find(x => x.id === id);
    if (!integ || !integ.doc || !integ.doc.plantillaEmail) return;
    const txt = integ.doc.plantillaEmail;
    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(txt);
        } else {
            const ta = document.createElement('textarea');
            ta.value = txt;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        if (btn) {
            const old = btn.innerHTML;
            btn.classList.add('copied');
            btn.innerHTML = '<svg aria-hidden="true" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Copiado';
            setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = old; }, 1800);
        }
    } catch (e) {
        console.warn('[copiarPlantilla] error:', e);
        if (btn) btn.textContent = 'Error';
    }
}

window.openSidebar       = openSidebar;
window.closeSidebar      = closeSidebar;
window.renderLista       = renderLista;
window.abrirDoc          = abrirDoc;
window.cerrarDoc         = cerrarDoc;
window.copiarPlantilla   = copiarPlantilla;

// Render inicial
renderLista();
</script>
