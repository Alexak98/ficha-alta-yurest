<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Churn Técnico — Yurest</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app" id="appContainer">
    <aside class="top-churn" id="topChurnPanel" aria-label="Top clientes por churn">
      <div class="top-churn-header">
        <h3>Top churn</h3>
        <span class="top-churn-sub">Hasta 15 clientes</span>
      </div>
      <ol class="top-churn-list" id="topChurnList"></ol>
      <div class="top-churn-empty" id="topChurnEmpty" hidden>Sin datos todavía</div>
    </aside>
    <main class="main">
      <div class="toolbar">
        <div class="search-box">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" id="searchInput" placeholder="Buscar cliente..." />
        </div>
        <div class="client-count" id="clientCount"></div>
      </div>
      <div class="tag-filters" id="tagFilters">
        <!-- Tag filter chips rendered by JS -->
      </div>

      <div class="churn-filter" id="churnFilter">
        <span class="churn-filter-label">Nivel de churn</span>
        <div class="churn-filter-controls">
          <select id="churnMin" class="churn-filter-select" aria-label="Nivel mínimo"></select>
          <span class="churn-filter-dash">—</span>
          <select id="churnMax" class="churn-filter-select" aria-label="Nivel máximo"></select>
          <label class="churn-filter-check">
            <input type="checkbox" id="churnIncludeNull" checked />
            <span>incluir sin análisis</span>
          </label>
          <button class="churn-filter-reset hidden" id="churnFilterReset" type="button" title="Limpiar filtro">Limpiar</button>
        </div>
      </div>

      <div class="clients-grid" id="clientsGrid">
        <!-- Cards rendered by JS -->
      </div>
    </main>
  </div>

  <!-- Modal fullscreen -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Resumen del cliente</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="progress-bar-container hidden" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Content rendered by JS -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
